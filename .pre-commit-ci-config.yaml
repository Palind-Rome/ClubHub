# CI pre-commit 配置
# 由 .github/workflows/code-check.yml 调用。
# 与本地配置的区别：仅检查不修改（prettier --check、dotnet format --verify-no-changes）。

exclude: "frontend/src/api/.*|backend/Models/.*|backend/Generated/.*"

repos:
  # ---- 通用检查 ----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        args: [--maxkb=2000]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # 注意：dotnet format 和 prettier 语言检查由 code-check.yml 的
  # frontend-check / backend-check Job 独立执行，不在 pre-commit 中重复运行。
