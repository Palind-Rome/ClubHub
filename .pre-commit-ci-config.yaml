# CI pre-commit 配置
# 由 .github/workflows/code-check.yml 调用。
# 与本地配置的区别：仅检查不修改（prettier --check、dotnet format --verify-no-changes）。

exclude: "frontend/src/api/.*|backend/Models/.*|backend/Generated/.*"

repos:
  # ---- 通用检查 ----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        args: [--maxkb=2000]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # ---- 后端：C# 代码风格 ----
  - repo: local
    hooks:
      - id: dotnet-format
        name: dotnet format
        entry: dotnet format backend/ --verify-no-changes
        language: system
        pass_filenames: false

  # ---- 前端：Prettier 格式检查 ----
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        args: [--check]
        types_or: [javascript, jsx, typescript, tsx, vue, json, yaml, css, scss, markdown]
        exclude: "pnpm-lock.yaml|package-lock.json"
