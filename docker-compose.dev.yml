# 本地开发环境 Docker Compose
# 一键启动：docker compose -f docker-compose.dev.yml up
# 源码挂载 + 热重载，不需要装 .NET SDK 或 Node.js，只需要 Docker。
#
# 注意：数据库不在容器内，连接信息在 appsettings.Development.json 中配置远程 Oracle。

services:
  backend:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /src
    ports:
      - "5000:5000"
    volumes:
      - .:/src
    command: >
      sh -c "dotnet restore backend/ClubHub.Api.csproj &&
             dotnet watch run --project backend/ClubHub.Api.csproj --urls http://0.0.0.0:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Minio__Endpoint=${MINIO_ENDPOINT:-}
      - Minio__PublicEndpoint=${MINIO_PUBLIC_ENDPOINT:-}
      - Minio__AccessKey=${MINIO_ACCESS_KEY:-}
      - Minio__SecretKey=${MINIO_SECRET_KEY:-}
      - Minio__Bucket=${MINIO_BUCKET:-clubhub-learning}
      - Minio__UseSsl=${MINIO_USE_SSL:-true}
      - Minio__PublicUseSsl=${MINIO_PUBLIC_USE_SSL:-true}
      - Minio__AutoCreateBucket=${MINIO_AUTO_CREATE_BUCKET:-false}
      - Minio__DownloadUrlExpirySeconds=${MINIO_DOWNLOAD_URL_EXPIRY_SECONDS:-300}

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules    # 匿名卷：避免宿主机 node_modules 覆盖容器内版本
    command: >
      sh -c "corepack enable &&
             pnpm install --frozen-lockfile &&
             pnpm run dev --host"
    environment:
      - API_PROXY_TARGET=http://backend:5000
    depends_on:
      - backend
