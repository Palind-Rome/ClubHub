name: 缺陷报告
description: 报告缺陷或答辩演示风险
title: "[缺陷] "
labels: [bug]
assignees: []
body:
  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 请选择此缺陷的优先级
      options:
        - 优先级:P0
        - 优先级:P1
        - 优先级:P2
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 领域
      description: 请选择此缺陷所属的业务领域
      options:
        - area:auth
        - area:club
        - area:activity
        - area:venue
        - area:project
        - area:learning
        - area:material
        - area:evaluation
        - area:notice
        - area:analytics
        - area:forum
        - area:frontend
        - area:recruitment
        - area:docs
        - area:meta
    validations:
      required: true
  - type: textarea
    id: bug_description
    attributes:
      label: 问题现象
      description: 请描述你观察到的缺陷现象
      placeholder: |
        清晰描述问题是什么……
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: 预期表现
      description: 请描述你期望的正确行为
      placeholder: |
        应该发生什么……
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请提供尽可能详细的复现步骤
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境
      description: 请提供环境信息
      placeholder: |
        - 分支：
        - 浏览器 / 系统：
        - Oracle 连接：
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 证据
      description: 截图、日志、错误信息等（可选）
      placeholder: 拖入截图或粘贴日志……
    validations:
      required: false
