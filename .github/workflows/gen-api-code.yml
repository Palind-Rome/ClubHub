name: 生成 API 代码

# 从 api/openapi.yaml 自动生成前端 TypeScript Fetch 客户端和后端 ASP.NET Core 数据模型。
# 开发者修改 API 契约后 push，本 workflow 自动生成代码并提交回分支。

on:
  push:
    branches-ignore:
      - main
      - dev
    paths:
      - api/**
  workflow_dispatch:

permissions:
  contents: write # 自动提交生成代码

jobs:
  generate:
    name: 生成前后端 API 代码
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      # ============================================================
      # 检测项目目录
      # ============================================================
      - name: 检测项目结构
        id: detect
        shell: bash
        run: |
          if [[ -f "frontend/package.json" ]]; then
            echo "has_frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_frontend=false" >> "$GITHUB_OUTPUT"
            echo "前端项目尚未建立，跳过前端代码生成。"
          fi

          if find backend -name "*.csproj" -print -quit | grep -q .; then
            echo "has_backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_backend=false" >> "$GITHUB_OUTPUT"
            echo "后端项目尚未建立，跳过后端代码生成。"
          fi

      # ============================================================
      # 验证 OpenAPI 规范
      # ============================================================
      - name: 验证 OpenAPI 规范语法
        shell: bash
        run: |
          # 简单 YAML 语法检查
          python3 -c "import yaml; yaml.safe_load(open('api/openapi.yaml'))" 2>/dev/null || {
            echo "::warning::Python yaml 不可用，跳过 YAML 语法验证。"
          }
          # 至少确认文件是合法的 OpenAPI（有 openapi 版本字段）
          grep -q 'openapi:\s*3\.' api/openapi.yaml || {
            echo "::error::api/openapi.yaml 缺少 openapi 版本声明。"
            exit 1
          }
          echo "OpenAPI 规范语法检查通过。"

      # ============================================================
      # 前端生成：TypeScript Fetch 客户端
      # ============================================================
      - name: 生成前端 TypeScript Fetch 客户端
        if: steps.detect.outputs.has_frontend == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p frontend/src/api

          npx --yes @openapitools/openapi-generator-cli@2.39.1 generate \
            -i api/openapi.yaml \
            -g typescript-fetch \
            -o frontend/src/api \
            --additional-properties=supportsES6=true,withSeparateModelsAndApi=true,apiPackage=api,modelPackage=models

          # 生成代码由 OpenAPI Generator 维护，不按业务源码规则做逐行类型检查。
          find frontend/src/api -type f -name "*.ts" -exec sed -i '1i// @ts-nocheck' {} +

          npx --yes prettier@3.9.4 --no-ignore --write "frontend/src/api"

          # 清理生成器自带文件（模板脚本、忽略文件、元数据、文档）
          rm -f frontend/src/api/git_push.sh
          rm -f frontend/src/api/.gitignore
          rm -f frontend/src/api/.npmignore
          rm -f frontend/src/api/.openapi-generator-ignore
          rm -rf frontend/src/api/.openapi-generator
          rm -rf frontend/src/api/docs

          # 删除与 PascalCase 同名的小写文件（Windows 大小写冲突）
          # 逻辑：小写 + 无连字符 → 猜测有 PascalCase 对应文件 → 有则删除
          for f in frontend/src/api/models/[a-z]*.ts; do
            [[ ! -f "$f" ]] && continue
            base=$(basename "$f")
            [[ "$base" == *-* ]] && continue  # 连字符文件不冲突（如 api-error.ts ≠ ApiError.ts）
            pascal="${base^}"                   # bash: 首字母大写
            [[ -f "$(dirname "$f")/${pascal}" ]] && rm -f "$f"
          done

          echo "前端 TypeScript Fetch 客户端已生成。"

      - name: Setup .NET
        if: steps.detect.outputs.has_backend == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # ============================================================
      # 后端生成：ASP.NET Core 数据模型
      # ============================================================
      - name: 生成后端 ASP.NET Core 模型
        if: steps.detect.outputs.has_backend == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p backend/Models

          npx --yes @openapitools/openapi-generator-cli@2.39.1 generate \
            -i api/openapi.yaml \
            -g aspnetcore \
            -o backend/Generated \
            --additional-properties=aspnetCoreVersion=8.0,pocoModels=true,useNewtonsoft=false,nullableReferenceTypes=true

          # 只保留 Models 目录（Controller 由开发者手写）
          models_dir="$(find backend/Generated/src -type d -path '*/Models' -print -quit)"
          if [[ -n "$models_dir" ]]; then
            cp -R "$models_dir"/. backend/Models/
          else
            echo "::error::未找到 OpenAPI Generator 输出的 Models 目录。"
            exit 1
          fi
          rm -rf backend/Generated

          # 移除生成代码中对不存在命名空间和类型的引用
          find backend/Models -type f -name "*.cs" -exec sed -i \
            -e '/^using Org\.OpenAPITools\.Converters;$/d' \
            -e '/\[TypeConverter(typeof(CustomEnumConverter<.*>))\]/d' \
            {} +

          # 生成模型依赖 Newtonsoft.Json。项目文件不在自动提交范围内，
          # 缺依赖时直接失败，提醒开发者用独立提交修复。
          if ! grep -q 'Newtonsoft\.Json' backend/ClubHub.Api.csproj; then
            echo "::error::backend/ClubHub.Api.csproj 缺少 Newtonsoft.Json 包引用。请先手动添加并提交。"
            exit 1
          fi

          dotnet format backend/ClubHub.Api.csproj --include backend/Models --verbosity minimal
          echo "后端 ASP.NET Core 模型已生成。"

      # ============================================================
      # 自动提交生成代码
      # ============================================================
      - name: 提交生成代码
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(api): 从 openapi.yaml 自动生成 API 代码"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          # 只提交生成代码目录；前面的清理步骤会移除 docs、git_push.sh 和生成器元数据。
          file_pattern: "frontend/src/api/** backend/Models/**"
          commit_options: "--no-verify"
