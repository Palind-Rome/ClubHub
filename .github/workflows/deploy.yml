name: Deploy

# push main → 自动构建镜像并部署到 production
# 手动触发 → 选择部署到 staging 或 production
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: 部署环境
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/clubhub-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/clubhub-frontend

jobs:
  build-and-deploy:
    name: 构建镜像并部署
    runs-on: ubuntu-latest
    environment: ${{ inputs.target || 'production' }}
    concurrency:
      group: deploy-${{ inputs.target || 'production' }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- 确定镜像标签 ----
      - name: 确定镜像标签
        id: tags
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
          fi
          echo "sha_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      # ---- 登录 GitHub Container Registry ----
      - name: 登录 ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- 构建并推送后端镜像 ----
      - name: 构建后端镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tags.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:${{ steps.tags.outputs.sha_tag }}

      # ---- 构建并推送前端镜像 ----
      - name: 构建前端镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tags.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tags.outputs.sha_tag }}

      # ---- 上传 docker-compose.yml 到服务器 ----
      - name: 上传 docker-compose.yml
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: docker-compose.yml
          target: ${{ secrets.DEPLOY_PATH }}

      # ---- 服务器上拉取镜像并重启 ----
      - name: 部署到服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            echo "=== 拉取新镜像 ==="
            docker compose pull

            echo "=== 启动服务 ==="
            docker compose up -d

            echo "=== 等待健康检查 ==="
            sleep 5
            if ! docker compose ps --status running | grep -q "Up"; then
              echo "!!! 服务启动失败 !!!"
              docker compose logs --tail 50
              exit 1
            fi

            echo "=== 部署成功 ==="
            docker compose ps

            echo "=== 清理旧镜像 ==="
            docker image prune -af --filter "until=24h"
