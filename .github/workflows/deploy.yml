name: Deploy

# push main → 自动构建镜像并部署到 production
# 手动触发 → 选择部署到 staging 或 production
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: 部署环境
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    name: 构建镜像并部署
    runs-on: ubuntu-latest
    environment: ${{ inputs.target || 'production' }}
    concurrency:
      group: deploy-${{ inputs.target || 'production' }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- 确定镜像标签 ----
      - name: 确定镜像名称和标签
        id: meta
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "backend_image=ghcr.io/${owner}/clubhub-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${owner}/clubhub-frontend" >> "$GITHUB_OUTPUT"
          echo "tag=latest" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      # ---- 登录 GitHub Container Registry ----
      - name: 登录 ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- 构建并推送后端镜像 ----
      - name: 构建后端镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.sha_tag }}

      # ---- 构建并推送前端镜像 ----
      - name: 构建前端镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.sha_tag }}

      # ---- 必需 Secret 缺失时尽早失败，避免部署出空连接串的坏容器 ----
      - name: 校验部署 Secret
        shell: bash
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          if [ -z "${DB_CONNECTION_STRING:-}" ]; then
            echo "::error::缺少 GitHub Secret：DB_CONNECTION_STRING。请先在仓库或目标环境的 Secrets 中配置 Oracle 连接串。"
            exit 1
          fi

      # ---- 准备服务器部署目录和网络 ----
      - name: 准备服务器部署目录
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            docker network inspect clubhub-net >/dev/null 2>&1 || docker network create clubhub-net

      # ---- 上传 docker-compose.yml 到服务器 ----
      - name: 上传 docker-compose.yml
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: docker-compose.yml
          target: ${{ secrets.DEPLOY_PATH }}

      # ---- 服务器上拉取镜像并重启，最多重试 3 次 ----
      - name: 部署到服务器
        uses: appleboy/ssh-action@v1
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 60s
          command_timeout: 20m
          envs: DB_CONNECTION_STRING,GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            retry() {
              attempts="$1"
              delay="$2"
              shift 2
              count=1
              until "$@"; do
                status=$?
                if [ "$count" -ge "$attempts" ]; then
                  echo "!!! 命令失败，已重试 ${attempts} 次: $*"
                  return "$status"
                fi
                count=$((count + 1))
                echo "命令失败（退出码 ${status}），${delay}s 后重试 ${count}/${attempts}: $*"
                sleep "$delay"
              done
            }

            write_env_var() {
              key="$1"
              value="$2"
              tmp="$(mktemp)"

              if [ -f .env ]; then
                grep -v "^${key}=" .env > "$tmp" || true
              fi

              escaped_value="$(printf "%s" "$value" | sed "s/'/'\\\\''/g")"
              printf "%s='%s'\n" "$key" "$escaped_value" >> "$tmp"
              mv "$tmp" .env
              chmod 600 .env
            }

            wait_for_services() {
              docker compose ps
              if ! docker compose ps --services --status running | grep -q "^backend$"; then
                echo "!!! 后端服务未运行 !!!"
                docker compose logs --tail 50
                return 1
              fi
              if ! docker compose ps --services --status running | grep -q "^frontend$"; then
                echo "!!! 前端服务未运行 !!!"
                docker compose logs --tail 50
                return 1
              fi
            }

            deploy_once() {
              echo "=== 写入数据库连接串 ==="
              if [ -z "${DB_CONNECTION_STRING:-}" ]; then
                echo "!!! DB_CONNECTION_STRING 为空，请检查 GitHub Secret 配置 !!!"
                return 1
              fi
              write_env_var DB_CONNECTION_STRING "$DB_CONNECTION_STRING"

              echo "=== 登录 ghcr.io ==="
              printf "%s" "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

              echo "=== 拉取新镜像 ==="
              retry 3 20 docker compose pull

              echo "=== 启动服务 ==="
              retry 3 20 docker compose up -d

              echo "=== 等待服务启动 ==="
              sleep 10
              retry 6 10 wait_for_services

              echo "=== 应用健康检查 ==="
              retry 6 10 curl -fsS http://127.0.0.1/api/health
            }

            attempt=1
            until deploy_once; do
              status=$?
              if [ "$attempt" -ge 3 ]; then
                echo "!!! 部署失败，已尝试 ${attempt} 次 !!!"
                docker compose ps || true
                docker compose logs --tail 100 || true
                exit "$status"
              fi
              attempt=$((attempt + 1))
              echo "部署失败（退出码 ${status}），20s 后重试 ${attempt}/3"
              sleep 20
            done

            echo "=== 部署成功 ==="
            docker compose ps

            echo "=== 清理旧镜像 ==="
            docker image prune -af --filter "until=24h"
