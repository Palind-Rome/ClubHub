name: 代码质量门禁

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  code-check:
    name: 代码质量门禁
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 运行通用 pre-commit 检查
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --config .pre-commit-ci-config.yaml --all-files

  frontend-check:
    name: 前端代码检查
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: code-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Prettier 格式检查
        run: pnpm run format:ci
        working-directory: frontend

  backend-check:
    name: 后端代码检查
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: code-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: dotnet format
        run: dotnet format backend/ClubHub.Api.csproj --verify-no-changes --exclude "backend/Models/**"
