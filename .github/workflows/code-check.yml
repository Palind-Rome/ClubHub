name: 代码质量门禁

# 对 PR 执行 pre-commit 代码质量检查。
# 通用检查始终运行；前后端语言检查在项目建立后启用。

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  code-check:
    name: 代码质量门禁
    runs-on: ubuntu-latest
    if: ${{ ! (github.event_name == 'pull_request' && github.event.pull_request.draft) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 运行通用 pre-commit 检查
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --config .pre-commit-ci-config.yaml --all-files

