# 生产环境 Docker Compose
# 部署流程：CI 构建镜像 → 推送到 ghcr.io → 服务器 docker compose pull && up -d
#
# 服务器上运行：docker compose up -d

services:
  backend:
    image: ghcr.io/palind-rome/clubhub-backend:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__Default: ${DB_CONNECTION_STRING}
      Authentication__TokenSigningKey: ${AUTH_TOKEN_SIGNING_KEY}
      Oss__Region: ${OSS_REGION:-cn-shanghai}
      Oss__Endpoint: ${OSS_ENDPOINT:-oss-cn-shanghai-internal.aliyuncs.com}
      Oss__Bucket: ${OSS_BUCKET:-clubhub-learning-prod-2026-c7h2}
      Oss__RoleName: ${OSS_ROLE_NAME:-ClubHubOssProdRole}
    expose:
      - "5000"
    networks:
      - clubhub-net
    restart: unless-stopped

  frontend:
    image: ghcr.io/palind-rome/clubhub-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - clubhub-net
    restart: unless-stopped

networks:
  clubhub-net:
    external: true
