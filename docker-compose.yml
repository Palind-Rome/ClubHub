# 生产环境 Docker Compose
# 部署流程：CI 构建镜像 → 推送到 ghcr.io → 服务器 docker compose pull && up -d
#
# 服务器上运行：docker compose up -d

services:
  backend:
    image: ghcr.io/palind-rome/clubhub-backend:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
    expose:
      - "5000"
    networks:
      - clubhub-net
    restart: unless-stopped

  frontend:
    image: ghcr.io/palind-rome/clubhub-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - clubhub-net
    restart: unless-stopped

networks:
  clubhub-net:
    external: true
