        "404":
          description: 当前用户、社团或小组不存在
        "409":
          description: 社团状态不允许维护或小组名称冲突

  /api/clubs/{clubId}/members/terms:
    post:
      summary: 新增社团成员或干部任期
      description: 系统管理员、本社团负责人或指导老师可以为成员新增职位任期；新增任期时可关闭该成员原有效任期以保留历史记录。
      operationId: createClubMemberTerm
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClubMemberTermRequest"
