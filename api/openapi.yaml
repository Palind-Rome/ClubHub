    NoticeReadResult:
      type: object
      description: 通知已读记录结果；接口成功响应表示该用户已经完成已读标记。
      properties:
        noticeId:
          type: integer
          description: 通知 ID。
          example: 1
        userId:
          type: integer
          description: 阅读用户 ID。
          example: 3
        isRead:
          type: boolean
          description: 是否已读；成功响应中始终为 true，不用于区分新写入或既有记录。
          example: true
        readAt:
          type: string
          format: date-time
          description: 已读时间。
      required:
        - noticeId
        - userId
        - isRead
        - readAt

