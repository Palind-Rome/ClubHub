        "404":
          description: 当前用户、社团或目标成员不存在
        "409":
          description: 社团状态不允许维护

  /api/clubs/{clubId}/members/{memberId}:
    patch:
      summary: 更新社团成员或干部任期
      description: 系统管理员、本社团负责人或指导老师可以修正成员部门、职位、任期和状态，不删除历史记录。
      operationId: updateClubMemberTerm
      parameters:
        - name: clubId
          in: path
          required: true
          description: 社团 ID。
          schema:
            type: integer
            example: 1
        - name: memberId
          in: path
          required: true
          description: 成员任期记录 ID。
          schema:
            type: integer
            example: 101
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClubMemberTermRequest"
      responses:
        "200":
          description: 社团成员或干部任期已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubMemberRecord"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有维护该社团成员的权限
        "404":
          description: 当前用户、社团或成员任期记录不存在
        "409":
          description: 社团状态不允许维护

  /api/clubs/{clubId}/members/{memberId}/grouping:
    patch:
      summary: 更新社团成员部门和小组归属
      description: 系统管理员、本社团负责人或指导老师可以调整成员部门和小组；干部只能维护自己管辖范围内的当前有效成员，并只能分配到自己管辖范围。
      operationId: updateClubMemberGrouping
      parameters:
        - name: clubId
          in: path
          required: true
          description: 社团 ID。
          schema:
            type: integer
            example: 1
        - name: memberId
          in: path
          required: true
          description: 成员任期记录 ID。
          schema:
            type: integer
            example: 101
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClubMemberGroupingRequest"
      responses:
        "200":
          description: 社团成员部门和小组已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubMemberRecord"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有维护该成员分组的权限
        "404":
          description: 当前用户、社团或成员任期记录不存在
        "409":
          description: 社团状态或成员任期状态不允许维护

  /api/clubs/{clubId}/members/self/exit:
    patch:
      summary: 学生主动退出社团
      description: 当前社团成员主动退出社团，系统保留历史任期记录，并同步移除该社团成员身份角色。
      operationId: exitCurrentClubMember
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExitClubMemberRequest"
      responses:
        "204":
          description: 已退出社团
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有退出该社团的权限或需先移交负责人
        "404":
          description: 当前用户、社团或有效成员身份不存在
        "409":
          description: 社团状态不允许退出或成员身份已结束

  /api/clubs/{clubId}/members/{memberId}/exit:
    patch:
      summary: 移出社团成员
      description: 系统管理员、本社团负责人或干部可以将当前有效成员移出社团，系统保留历史任期记录，并同步移除该社团成员身份角色。
      operationId: removeClubMember
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExitClubMemberRequest"
      responses:
        "204":
          description: 已移出社团成员
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有移出该成员的权限或需先移交负责人
        "404":
          description: 当前用户、社团或成员任期记录不存在
        "409":
          description: 社团状态不允许移出或成员身份已结束

  /api/clubs/{clubId}/evaluations:
    get:
      summary: 查询社团成员评价考核记录
      description: 普通成员只能查看本人已公示评价；干部只能查看本人管辖部门或小组成员评价；负责人和系统管理员可查看本社团全部评价。evaluationType=award 用于评优评奖结果与公示。
      operationId: getClubEvaluations
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: termName
          in: query
          required: false
          schema:
            type: string
          description: 按 EVALUATIONS.term_name 精确筛选。
        - name: evaluationType
          in: query
          required: false
          schema:
            type: string
            enum: [semester, award]
          description: semester 表示学期考核，award 表示评优评奖结果。
      responses:
        "200":
          description: 按角色可见范围过滤后的评价考核记录
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClubEvaluationRecord"
        "403":
          description: 当前用户没有查看该社团评价考核的权限
        "404":
          description: 当前用户或社团不存在

    post:
      summary: 录入社团成员评价考核或评优评奖结果
      description: 负责人和系统管理员可以录入任意成员评价；干部只能录入自己管辖部门或小组成员评价。评优评奖按 evaluationType=award 记录奖项标题、等级、获奖原因和公示状态。
      operationId: createClubEvaluation
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClubEvaluationRequest"
      responses:
        "201":
          description: 评价考核记录已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubEvaluationRecord"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有录入该成员评价考核的权限
        "404":
          description: 当前用户、社团或目标成员不存在
        "409":
          description: 社团状态不允许维护

  /api/clubs/{clubId}/evaluations/score-preview:
    get:
      summary: 预览成员考核系统生成分
      description: 负责人、指导老师、系统管理员或有维护范围的干部可按成员与学期预览活动分、任务分、学习分、奖项分、总分和等级；维护人可在系统生成分基础上微调后保存。
      operationId: previewClubEvaluationScores
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
          description: 被考核成员用户 ID。
        - name: termName
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          description: 考核学期；后端会解析为时间窗口并匹配活动、任务、学习和评优记录，支持 2025-2026学年春季、2026-2027学年秋季、2026秋季或 2027春季，年份区间须为相邻学年，无法解析会返回 400。
      responses:
        "200":
          description: 系统生成的成员考核分预览
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubEvaluationScorePreview"
        "400":
          description: 请求参数不符合业务规则
        "403":
          description: 当前用户没有预览该成员考核分的权限
        "404":
          description: 当前用户、社团或目标成员不存在
        "409":
          description: 社团状态不允许维护

  /api/clubs/{clubId}/evaluations/generate:
    post:
      summary: 批量生成成员考核草稿
      description: 系统管理员、本社团负责人或指导老师可以按学期为当前有效成员批量生成成员考核草稿；已公示记录不会被覆盖，已存在草稿会按系统生成分刷新，之后可由维护人微调并确认公示。
      operationId: generateClubEvaluations
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateClubEvaluationsRequest"
      responses:
        "200":
          description: 成员考核草稿生成结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateClubEvaluationsResult"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有批量生成该社团考核的权限
        "404":
          description: 当前用户或社团不存在
        "409":
          description: 社团状态不允许维护

  /api/clubs/{clubId}/evaluations/{evaluationId}:
    patch:
      summary: 更新社团成员评价考核或评优评奖结果
      description: 负责人和系统管理员可以更新任意成员评价；干部只能更新自己管辖部门或小组成员评价。学期考核可在系统生成分基础上微调四项分数，总分和等级由后端按保存后的四项分数重新计算，公示状态用于控制结果展示。
      operationId: updateClubEvaluation
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: evaluationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClubEvaluationRequest"
      responses:
        "200":
          description: 评价考核记录已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubEvaluationRecord"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有维护该评价考核的权限
        "404":
          description: 当前用户、社团或评价考核记录不存在
        "409":
          description: 社团状态不允许维护

  /api/recruitments:
    get:
      summary: 查询社团招募列表
      description: 学生可查看审核通过后的纳新和自己的报名状态；社团干部、负责人可查看本社团草稿、审核中和已通过纳新；社团管理员可查看审核中的纳新。
      operationId: getRecruitments
      parameters:
        - name: viewerUserId
          in: query
          required: true
          description: 当前登录用户 ID（临时兼容，待 RecruitmentsController 迁移至 JWT 后移除）。
          schema:
            type: integer
            minimum: 1
        - name: clubId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, pending_review, not_started, accepting, ended]
      responses:
        "200":
          description: 招募列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recruitment"
        "400":
          description: 请求参数不合法
        "404":
          description: 当前用户不存在
    post:
      summary: 创建社团招募
      description: 系统管理员或目标社团的社团干部、负责人可以创建草稿或提交审核；审核通过后才会对学生开放。
      operationId: createRecruitment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecruitmentRequest"
      responses:
        "201":
          description: 招募已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recruitment"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有管理该社团招募的权限
        "404":
          description: 当前用户或社团不存在
        "409":
          description: 社团状态不允许创建招募

  /api/recruitments/{recruitId}:
    patch:
      summary: 更新社团招募
      description: 目标社团的社团干部、负责人可以维护本社团草稿，并将草稿提交社团管理员审核；发布者不能直接改为开放状态。
      operationId: updateRecruitment
      parameters:
        - name: recruitId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecruitmentRequest"
      responses:
        "200":
          description: 招募已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recruitment"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有管理该社团招募的权限
        "404":
          description: 当前用户或招募不存在
        "409":
          description: 招募状态不允许维护
    delete:
      summary: 删除草稿招募
      description: 目标社团的社团干部、负责人可以删除本社团草稿招募。
      operationId: deleteRecruitment
      parameters:
        - name: currentUserId
          in: query
          required: true
          description: 当前登录用户 ID（临时兼容，待 RecruitmentsController 迁移至 JWT 后移除）。
          schema:
            type: integer
            minimum: 1
        - name: recruitId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 草稿已删除
        "400":
          description: 当前用户不合法
        "403":
          description: 当前用户没有删除该草稿的权限
        "404":
          description: 当前用户或招募不存在
        "409":
          description: 只有草稿招募可以删除

  /api/recruitments/{recruitId}/review:
    patch:
      summary: 审核社团招募
      description: 社团管理员审核干部或负责人提交的纳新；审核通过后按开始和结束时间自动显示为未开始、申请中或已结束，驳回后回到草稿。
      operationId: reviewRecruitment
      parameters:
        - name: recruitId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewRecruitmentRequest"
      responses:
        "200":
          description: 审核结果已保存
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recruitment"
        "400":
          description: 审核内容不符合业务规则
        "403":
          description: 当前用户没有审核招募的权限
        "404":
          description: 当前用户或招募不存在
        "409":
          description: 招募状态不允许审核或同一社团同时间已有已通过招募

  /api/recruitments/{recruitId}/applications:
    get:
      summary: 查询招募报名列表
      description: 社团干部可查看本招募全部报名；学生只能查看自己的报名。
      operationId: getRecruitmentApplications
      parameters:
        - name: viewerUserId
          in: query
          required: true
          description: 当前登录用户 ID（临时兼容，待 RecruitmentsController 迁移至 JWT 后移除）。
          schema:
            type: integer
            minimum: 1
        - name: recruitId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 招募报名列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecruitmentApplication"
        "403":
          description: 当前用户没有查看该招募报名的权限
        "404":
          description: 当前用户或招募不存在
    post:
      summary: 提交招募报名
      description: 学生在招募开放时间内提交报名理由；同一学生对同一招募只能提交一次。
      operationId: createRecruitmentApplication
      parameters:
        - name: recruitId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecruitmentApplicationRequest"
      responses:
        "201":
          description: 报名已提交
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecruitmentApplication"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有报名权限
        "404":
          description: 当前用户或招募不存在
        "409":
          description: 已报名、已是成员、社团数量达到上限或招募不接受报名

  /api/recruitments/applications/{applicationId}/review:
    patch:
      summary: 筛选招募报名
      description: 社团干部录入面试分并给出录取或拒绝结论；录取后写入社团成员表。
      operationId: reviewRecruitmentApplication
      parameters:
