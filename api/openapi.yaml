openapi: 3.0.3
info:
  title: ClubHub API
  description: |
    ClubHub 高校社团运营与协同管理平台 API。

    **API-first 开发流程**：修改本文件 → push → CI 自动生成前后端代码 →
    git pull 拉取生成代码 → 在 Controller / Services / Vue 组件中手写业务逻辑。
  version: 0.1.0
  contact:
    name: ClubHub Team

servers:
  - url: http://localhost:5000/api
    description: 本地开发服务器

tags:
  - name: Clubs
    description: 社团管理
  - name: Activities
    description: 活动管理
  - name: Venues
    description: 场地管理

paths:
  # ============================================================
  # Clubs
  # ============================================================
  /clubs:
    get:
      tags: [Clubs]
      summary: 获取社团列表
      operationId: getClubs
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: keyword
          in: query
          description: 按名称或简介搜索
          schema:
            type: string
      responses:
        "200":
          description: 社团列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClubSummary"
    post:
      tags: [Clubs]
      summary: 创建社团
      operationId: createClub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClubRequest"
      responses:
        "201":
          description: 社团已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
        "400":
          $ref: "#/components/responses/BadRequest"

  /clubs/{clubId}:
    get:
      tags: [Clubs]
      summary: 获取社团详情
      operationId: getClubById
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 社团详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Clubs]
      summary: 更新社团信息
      operationId: updateClub
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClubRequest"
      responses:
        "200":
          description: 社团已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"

  /clubs/{clubId}/members:
    get:
      tags: [Clubs]
      summary: 获取社团成员列表
      operationId: getClubMembers
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 成员列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClubMember"

  # ============================================================
  # Activities
  # ============================================================
  /activities:
    get:
      tags: [Activities]
      summary: 获取活动列表
      operationId: getActivities
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: clubId
          in: query
          description: 按社团筛选
          schema:
            type: integer
        - name: status
          in: query
          description: 按状态筛选
          schema:
            type: string
            enum: [draft, published, ongoing, finished, cancelled]
      responses:
        "200":
          description: 活动列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivitySummary"
    post:
      tags: [Activities]
      summary: 创建活动
      operationId: createActivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActivityRequest"
      responses:
        "201":
          description: 活动已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "400":
          $ref: "#/components/responses/BadRequest"

  /activities/{activityId}:
    get:
      tags: [Activities]
      summary: 获取活动详情
      operationId: getActivityById
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 活动详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Activities]
      summary: 更新活动信息
      operationId: updateActivity
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateActivityRequest"
      responses:
        "200":
          description: 活动已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  /activities/{activityId}/participants:
    get:
      tags: [Activities]
      summary: 获取活动报名列表
      operationId: getActivityParticipants
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 报名列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Participant"

  # ============================================================
  # Venues
  # ============================================================
  /venues:
    get:
      tags: [Venues]
      summary: 获取场地列表
      operationId: getVenues
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: 场地列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Venue"

  /venues/{venueId}:
    get:
      tags: [Venues]
      summary: 获取场地详情
      operationId: getVenueById
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 场地详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Venue"
        "404":
          $ref: "#/components/responses/NotFound"

# ============================================================
# Components
# ============================================================
components:
  schemas:
    # ---- 通用 ----
    ApiError:
      type: object
      properties:
        code:
          type: integer
          description: HTTP 状态码
        message:
          type: string
          description: 错误信息
      required: [code, message]

    # ---- 社团 ----
    ClubSummary:
      type: object
      properties:
        clubId:
          type: integer
        name:
          type: string
          description: 社团名称
        logoUrl:
          type: string
          nullable: true
          description: 社徽 URL
        category:
          type: string
          description: 社团分类
        memberCount:
          type: integer
          description: 成员人数
      required: [clubId, name, category, memberCount]

    Club:
      type: object
      properties:
        clubId:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        category:
          type: string
        establishedDate:
          type: string
          format: date
          nullable: true
        presidentId:
          type: integer
          description: 社长用户 ID
        memberCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [clubId, name, category, presidentId, memberCount, createdAt]

    CreateClubRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          nullable: true
        category:
          type: string
        presidentId:
          type: integer
      required: [name, category, presidentId]

    UpdateClubRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          nullable: true
        category:
          type: string
        logoUrl:
          type: string
          nullable: true

    ClubMember:
      type: object
      properties:
        userId:
          type: integer
        userName:
          type: string
        role:
          type: string
          description: 社团内角色（社长/副社长/普通成员）
        joinedAt:
          type: string
          format: date-time
      required: [userId, userName, role, joinedAt]

    # ---- 活动 ----
    ActivitySummary:
      type: object
      properties:
        activityId:
          type: integer
        title:
          type: string
        clubName:
          type: string
        venueName:
          type: string
          nullable: true
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          type: string
          enum: [draft, published, ongoing, finished, cancelled]
        participantCount:
          type: integer
        maxParticipants:
          type: integer
          nullable: true
      required:
        [activityId, title, clubName, startTime, endTime, status, participantCount]

    Activity:
      type: object
      properties:
        activityId:
          type: integer
        clubId:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        venueId:
          type: integer
          nullable: true
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        registrationDeadline:
          type: string
          format: date-time
          nullable: true
        maxParticipants:
          type: integer
          nullable: true
        status:
          type: string
          enum: [draft, published, ongoing, finished, cancelled]
        createdAt:
          type: string
          format: date-time
      required: [activityId, clubId, title, startTime, endTime, status, createdAt]

    CreateActivityRequest:
      type: object
      properties:
        clubId:
          type: integer
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          nullable: true
        venueId:
          type: integer
          nullable: true
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        registrationDeadline:
          type: string
          format: date-time
          nullable: true
        maxParticipants:
          type: integer
          nullable: true
      required: [clubId, title, startTime, endTime]

    UpdateActivityRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          nullable: true
        venueId:
          type: integer
          nullable: true
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        registrationDeadline:
          type: string
          format: date-time
          nullable: true
        maxParticipants:
          type: integer
          nullable: true

    Participant:
      type: object
      properties:
        userId:
          type: integer
        userName:
          type: string
        signedUpAt:
          type: string
          format: date-time
        checkedIn:
          type: boolean
          description: 是否已签到
      required: [userId, userName, signedUpAt, checkedIn]

    # ---- 场地 ----
    Venue:
      type: object
      properties:
        venueId:
          type: integer
        name:
          type: string
        location:
          type: string
          nullable: true
        capacity:
          type: integer
          nullable: true
        facilities:
          type: string
          nullable: true
          description: 设施说明
        isAvailable:
          type: boolean
          description: 是否可用
        createdAt:
          type: string
          format: date-time
      required: [venueId, name, isAvailable, createdAt]

  # ---- 通用响应 ----
  responses:
    BadRequest:
      description: 请求参数无效
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
