openapi: 3.0.3
info:
  title: ClubHub API
  description: |
    ClubHub 高校社团运营与协同管理平台 API。

    **API-first 开发流程**：修改本文件 → push → CI 自动生成前后端代码 →
    git pull 拉取生成代码 → 在 Controller / Services / Vue 组件中手写业务逻辑。
  version: 0.1.0

servers:
  - url: http://localhost:5000
    description: 本地开发服务器

paths:
  /api/health:
    get:
      summary: 健康检查
      operationId: healthCheck
      responses:
        "200":
          description: 服务正常运行
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /api/auth/register:
    post:
      summary: 用户注册
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: 注册信息不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: 用户名或学工号已存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/login:
    post:
      summary: 用户登录
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功，返回用户和角色信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: 登录信息不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: 用户名/学工号或密码错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 账号已被禁用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/session:
    get:
      summary: 刷新当前用户会话
      description: 依据用户 ID 重新计算角色、社团身份和权限，用于成员身份变化后的前端会话同步。
      operationId: refreshAuthSession
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: 已重新计算的用户会话
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: 请求参数不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 账号已被禁用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/roles:
    get:
      summary: 获取基础角色定义
      operationId: getRoleDefinitions
      responses:
        "200":
          description: 基础角色列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoleDefinition"

  /api/auth/permissions:
    get:
      summary: 获取权限目录
      operationId: getPermissionCatalog
      responses:
        "200":
          description: 权限目录
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PermissionDefinition"

  /api/auth/permissions/check:
    get:
      summary: 检查用户是否拥有指定权限
      operationId: checkPermission
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
        - name: permission
          in: query
          required: true
          schema:
            type: string
        - name: clubId
          in: query
          required: false
          description: Optional club id filter.
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: 权限判断结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionCheckResult"
        "400":
          description: 请求参数不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/roles/assign:
    post:
      summary: 分配用户角色
      operationId: assignUserRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignRoleRequest"
      responses:
        "200":
          description: 角色分配成功或已存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleAssignmentResult"
        "400":
          description: 请求参数不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 操作人没有角色分配权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 用户或角色不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/notices:
    get:
      summary: 查询公告通知
      description: 按当前用户权限返回面向全校、社团、部门或成员的有效通知，并附带已读状态。
      operationId: getNotices
      parameters:
        - name: viewerUserId
          in: query
          required: true
          description: 当前查看用户 ID。
          schema:
            type: integer
        - name: noticeStatus
          in: query
          required: false
          description: 公告状态筛选；默认返回 published。
          schema:
            type: string
            enum: [draft, published, expired]
            default: published
        - name: targetType
          in: query
          required: false
          description: 定向类型筛选。
          schema:
            type: string
            enum: [school, club, department, member]
        - name: clubId
          in: query
          required: false
          description: 社团上下文筛选。
          schema:
            type: integer
        - name: unreadOnly
          in: query
          required: false
          description: 是否仅返回未读通知。
          schema:
            type: boolean
      responses:
        "200":
          description: 当前用户可见的公告通知列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notice"
        "400":
          description: 查询参数不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 当前用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      summary: 发布公告通知
      description: 发布面向全校、指定社团、指定部门或指定成员的通知，并校验发布人权限和目标对象。
      operationId: createNotice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoticeRequest"
      responses:
        "201":
          description: 公告通知已发布
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notice"
        "400":
          description: 请求内容不符合业务规则
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 当前用户没有发布权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 发布人、社团或目标对象不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/notices/{noticeId}/reads:
    post:
      summary: 标记通知已读
      description: 当前用户阅读可见通知后写入已读记录；重复标记会返回已有记录。
      operationId: markNoticeRead
      parameters:
        - name: noticeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkNoticeReadRequest"
      responses:
        "200":
          description: 已读记录已存在或已写入
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoticeReadResult"
        "400":
          description: 当前用户缺失
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 当前用户不可阅读该通知
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 当前用户或通知不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/clubs:
    get:
      summary: 获取社团列表
      operationId: getClubs
      parameters:
        - name: viewerUserId
          in: query
          required: false
          description: 当前查看用户，用于返回与角色相关的社团视图。
          schema:
            type: integer
      responses:
        "200":
          description: 社团列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Club"
    post:
      summary: 创建社团
      operationId: createClub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClubRequest"
      responses:
        "201":
          description: 社团已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
        "400":
          description: 当前用户缺失、账号不可用或请求内容不合法
        "403":
          description: 仅平台管理员可以直接创建社团
        "404":
          description: 当前操作用户不存在
        "409":
          description: 社团名称已存在或已有有效注册申请

  /api/clubs/applications:
    get:
      summary: 按当前用户权限查询社团注册申请
      operationId: getClubApplications
      parameters:
        - name: viewerUserId
          in: query
          required: true
          description: 当前用户。学生只能查看自己的申请，平台管理员可以查看全部申请。
          schema:
            type: integer
        - name: auditStatus
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: 社团注册申请列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClubApplication"
        "400":
          description: 当前用户缺失或审核状态不合法
        "404":
          description: 当前用户不存在
    post:
      summary: 提交社团注册申请
      description: 仅学生角色可以提交社团注册申请；平台管理员、指导老师等非学生角色不能通过该入口发起申请。
      operationId: createClubApplication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClubApplicationRequest"
      responses:
        "201":
          description: 社团注册申请已提交
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubApplication"
        "400":
          description: 请求内容不符合业务规则
        "404":
          description: 当前用户不存在
        "403":
          description: 当前用户不是学生申请人或无权提交申请
        "409":
          description: 社团名称已存在或已有待审核申请

  /api/clubs/applications/{clubId}/review:
    patch:
      summary: 平台管理员审核社团注册申请
      operationId: reviewClubApplication
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewClubApplicationRequest"
      responses:
        "200":
          description: 审核结果已保存
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubApplication"
        "400":
          description: 审核内容不符合业务规则
        "404":
          description: 当前用户或申请不存在
        "409":
          description: 当前申请状态不允许审核
        "403":
          description: 当前用户没有审核权限

  /api/clubs/{clubId}:
    get:
      summary: 获取社团详情
      operationId: getClubById
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 社团详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
    put:
      summary: 更新社团
      operationId: updateClub
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClubRequest"
      responses:
        "200":
          description: 社团已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
  /api/clubs/{clubId}/dissolve:
    patch:
      summary: 解散社团
      description: 社团管理员或系统管理员可以解散社团；系统保留社团档案和成员任期历史，将社团状态标记为 inactive。
      operationId: dissolveClub
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DissolveClubRequest"
      responses:
        "204":
          description: 社团已解散
        "400":
          description: 当前用户或社团状态不符合业务规则
        "403":
          description: 当前用户没有解散社团权限
        "404":
          description: 当前用户或社团不存在
        "409":
          description: 社团已解散或当前状态不允许解散

  /api/clubs/{clubId}/profile:
    patch:
      summary: 维护社团基础信息
      description: 系统管理员或本社团负责人可以维护社团简介、联系方式、指导老师和负责人信息；社团管理员只处理社团注册审核和社团状态管理，不参与社团内部档案维护。
      operationId: updateClubProfile
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClubProfileRequest"
      responses:
        "200":
          description: 社团基础信息已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有维护该社团的权限
        "404":
          description: 当前用户、社团或负责人不存在
        "409":
          description: 社团状态不允许维护或社团名称冲突

  /api/clubs/{clubId}/members:
    get:
      summary: 查询社团成员与干部任期记录
      description: 系统管理员、本社团负责人、干部、成员和指导老师可以查看成员及任期；默认仅返回当前有效记录，可选择包含历史记录。社团管理员不查看社团内部任期。
      operationId: getClubMembers
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: viewerUserId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
        - name: includeHistory
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: 社团成员与任期记录列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClubMemberRecord"
        "403":
          description: 当前用户没有查看该社团成员的权限
        "404":
          description: 当前用户或社团不存在

  /api/clubs/{clubId}/members/terms:
    post:
      summary: 新增社团成员或干部任期
      description: 系统管理员或本社团负责人可以为成员新增职位任期；新增任期时可关闭该成员原有效任期以保留历史记录。
      operationId: createClubMemberTerm
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClubMemberTermRequest"
      responses:
        "201":
          description: 社团成员或干部任期已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubMemberRecord"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有维护该社团成员的权限
        "404":
          description: 当前用户、社团或目标成员不存在
        "409":
          description: 社团状态不允许维护

  /api/clubs/{clubId}/members/{memberId}:
    patch:
      summary: 更新社团成员或干部任期
      description: 系统管理员或本社团负责人可以修正成员部门、职位、任期和状态，不删除历史记录。
      operationId: updateClubMemberTerm
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClubMemberTermRequest"
      responses:
        "200":
          description: 社团成员或干部任期已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubMemberRecord"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有维护该社团成员的权限
        "404":
          description: 当前用户、社团或成员任期记录不存在
        "409":
          description: 社团状态不允许维护

  /api/clubs/{clubId}/members/self/exit:
    patch:
      summary: 学生主动退出社团
      description: 当前社团成员主动退出社团，系统保留历史任期记录，并同步移除该社团成员身份角色。
      operationId: exitCurrentClubMember
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExitClubMemberRequest"
      responses:
        "204":
          description: 已退出社团
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有退出该社团的权限或需先移交负责人
        "404":
          description: 当前用户、社团或有效成员身份不存在
        "409":
          description: 社团状态不允许退出或成员身份已结束

  /api/clubs/{clubId}/members/{memberId}/exit:
    patch:
      summary: 移出社团成员
      description: 系统管理员、本社团负责人或干部可以将当前有效成员移出社团，系统保留历史任期记录，并同步移除该社团成员身份角色。
      operationId: removeClubMember
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExitClubMemberRequest"
      responses:
        "204":
          description: 已移出社团成员
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有移出该成员的权限或需先移交负责人
        "404":
          description: 当前用户、社团或成员任期记录不存在
        "409":
          description: 社团状态不允许移出或成员身份已结束

  /api/recruitments:
    get:
      summary: 查询社团招募列表
      description: 学生可查看开放招募和自己的报名状态；系统管理员或社团干部可查看可管理社团的招募。
      operationId: getRecruitments
      parameters:
        - name: viewerUserId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
        - name: clubId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, published, closed]
      responses:
        "200":
          description: 招募列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recruitment"
        "400":
          description: 请求参数不合法
        "404":
          description: 当前用户不存在
    post:
      summary: 发布社团招募
      description: 系统管理员或目标社团的社团干部、负责人可以发布招募。
      operationId: createRecruitment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecruitmentRequest"
      responses:
        "201":
          description: 招募已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recruitment"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有管理该社团招募的权限
        "404":
          description: 当前用户或社团不存在
        "409":
          description: 社团状态不允许发布招募

  /api/recruitments/{recruitId}:
    patch:
      summary: 更新社团招募
      description: 系统管理员或目标社团的社团干部、负责人可以维护招募内容和状态。
      operationId: updateRecruitment
      parameters:
        - name: recruitId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecruitmentRequest"
      responses:
        "200":
          description: 招募已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recruitment"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有管理该社团招募的权限
        "404":
          description: 当前用户或招募不存在
        "409":
          description: 招募状态不允许维护

  /api/recruitments/{recruitId}/applications:
    get:
      summary: 查询招募报名列表
      description: 社团干部可查看本招募全部报名；学生只能查看自己的报名。
      operationId: getRecruitmentApplications
      parameters:
        - name: recruitId
          in: path
          required: true
          schema:
            type: integer
        - name: viewerUserId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: 招募报名列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecruitmentApplication"
        "403":
          description: 当前用户没有查看该招募报名的权限
        "404":
          description: 当前用户或招募不存在
    post:
      summary: 提交招募报名
      description: 学生在招募开放时间内提交报名理由；同一学生对同一招募只能提交一次。
      operationId: createRecruitmentApplication
      parameters:
        - name: recruitId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecruitmentApplicationRequest"
      responses:
        "201":
          description: 报名已提交
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecruitmentApplication"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有报名权限
        "404":
          description: 当前用户或招募不存在
        "409":
          description: 已报名、已是成员或招募不接受报名

  /api/recruitments/applications/{applicationId}/review:
    patch:
      summary: 筛选招募报名
      description: 社团干部录入面试分并给出录取或拒绝结论；录取后写入社团成员表。
      operationId: reviewRecruitmentApplication
      parameters:
        - name: applicationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewRecruitmentApplicationRequest"
      responses:
        "200":
          description: 筛选结果已保存
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecruitmentApplication"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有筛选该报名的权限
        "404":
          description: 当前用户或报名不存在
        "409":
          description: 报名状态、名额或成员关系不允许录取

  /api/activities:
    get:
      summary: 获取活动列表
      operationId: getActivities
      responses:
        "200":
          description: 活动列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"
    post:
      summary: 创建活动并提交审核
      operationId: createActivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActivityRequest"
      responses:
        "201":
          description: 活动已创建，等待审核
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "400":
          description: 请求参数或业务规则不合法

  /api/activities/{activityId}:
    get:
      summary: 获取活动详情
      operationId: getActivityById
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 活动详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  /api/activities/{activityId}/review:
    post:
      summary: 审核活动并发布或驳回
      operationId: reviewActivity
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewActivityRequest"
      responses:
        "200":
          description: 活动审核结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "400":
          description: 当前活动状态不允许审核
        "404":
          description: 活动不存在

  /api/activities/{activityId}/checkin-settings:
    put:
      summary: 设置活动签到签退码和有效时间
      operationId: updateActivityCheckinSettings
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCheckinSettingsRequest"
      responses:
        "200":
          description: 签到签退设置已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "400":
          description: 签到或签退时间段不合法
        "404":
          description: 活动不存在

  /api/activities/{activityId}/participations:
    get:
      summary: 获取活动参与记录
      operationId: getActivityParticipations
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 活动参与记录列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityParticipation"
        "404":
          description: 活动不存在

  /api/activities/{activityId}/checkin:
    post:
      summary: 活动签到
      operationId: checkinActivity
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivitySignRequest"
      responses:
        "200":
          description: 签到成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityParticipation"
        "400":
          description: 签到码、时间窗口或活动状态不合法
        "404":
          description: 活动不存在

  /api/activities/{activityId}/checkout:
    post:
      summary: 活动签退
      operationId: checkoutActivity
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivitySignRequest"
      responses:
        "200":
          description: 签退成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityParticipation"
        "400":
          description: 签退码、时间窗口或活动状态不合法
        "404":
          description: 活动不存在

  /api/users:
    get:
      summary: 获取当前账号可查看或可分配的用户列表
      operationId: getUsers
      parameters:
        - name: viewerUserId
          in: query
          required: true
          schema:
            type: integer
          description: 当前登录用户 ID，用于按角色限制可见用户范围。
        - name: clubId
          in: query
          required: false
          schema:
            type: integer
          description: 当用于维护指定社团成员任期或选择项目负责人时传入；仅系统管理员、本社团负责人或干部可获取该社团有效成员。
      responses:
        "200":
          description: 按当前账号权限过滤后的用户、角色和社团成员身份列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSummary"
        "400":
          description: 缺少当前登录用户 ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 当前账号无权查看该范围的用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 当前登录用户或社团不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"



  /api/projects:
    get:
      summary: 获取项目列表
      operationId: getProjects
      parameters:
        - name: clubId
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: 按社团 ID 过滤项目列表。
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: 页码，从 1 开始。
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: 每页项目数量，最大 100。
      responses:
        "200":
          description: 项目列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      summary: 社团负责人或指导老师提交项目立项申请
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: 项目立项申请已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: 请求参数或业务校验失败

  /api/projects/{projectId}:
    get:
      summary: 获取项目详情
      operationId: getProjectById
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 项目详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: 项目不存在

  /api/projects/{projectId}/leader:
    put:
      summary: 分配或调整项目负责人
      operationId: assignProjectLeader
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignProjectLeaderRequest"
      responses:
        "200":
          description: 项目负责人已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: 负责人不是有效用户或社团成员
        "403":
          description: 当前用户不是本社团负责人或干部，无权分配项目负责人
        "404":
          description: 项目不存在

  /api/projects/{projectId}/review:
    post:
      summary: 指导老师审核项目立项申请
      description: 1.10 项目立项采用一轮审核；仅本社团指导老师可将待审核申请审核为进行中或关闭。
      operationId: reviewProject
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewProjectRequest"
      responses:
        "200":
          description: 项目审核结果已保存
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: 审核状态或指导老师无效
        "403":
          description: 当前用户不是本社团指导老师，无权审核项目立项申请
        "404":
          description: 项目不存在

  /api/projects/{projectId}/cancel:
    post:
      summary: 撤销待审核或进行中的项目
      description: 系统管理员可撤销待审核或进行中项目；本社团负责人仅可撤销待审核申请；校级社团管理员仅可撤销进行中项目。
      operationId: cancelProject
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelProjectRequest"
      responses:
        "200":
          description: 项目立项申请已撤销
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: 项目不是待审核/进行中状态或当前用户无效
        "403":
          description: 当前用户无权撤销该项目申请
        "404":
          description: 项目不存在
components:
  schemas:
    ApiError:
      type: object
      properties:
        code:
          type: string
          nullable: true
          example: venue_reservation_conflict
        message:
          type: string
          example: 该场地在所选时间段已有已通过预约。
        detail:
          type: string
          nullable: true
      required:
        - message

    HealthStatus:
      type: object
      properties:
        status:
          type: string
          example: healthy
        timestamp:
          type: string
          format: date-time
      required:
        - status
        - timestamp

    RegisterRequest:
      type: object
      description: 用户注册请求。学生学工号为 7 位数字，教师工号为 5 位数字。
      properties:
        username:
          type: string
          description: 登录用户名，注册后必须唯一。
          minLength: 3
          maxLength: 50
          example: stu_public
        password:
          type: string
          description: 登录密码，服务端仅保存密码摘要。
          minLength: 6
          maxLength: 128
          example: ClubHub123
        realName:
          type: string
          description: 用户真实姓名。
          minLength: 1
          maxLength: 50
          example: 张三
        studentNo:
          type: string
          description: 学工号；学生 7 位，教师 5 位。
          minLength: 5
          maxLength: 7
          pattern: "^([0-9]{7}|[0-9]{5})$"
          example: "2450001"
        gender:
          type: string
          description: 性别，可为空；当前支持男、女。
          nullable: true
          maxLength: 10
          pattern: "^(男|女)$"
          example: 男
        phone:
          type: string
          description: 联系电话，可为空。
          nullable: true
          maxLength: 20
          pattern: "^[0-9+\\-\\s()]{0,20}$"
          example: "13800138000"
        email:
          type: string
          description: 邮箱地址，可为空。
          nullable: true
          format: email
          maxLength: 100
          example: zhangsan@example.com
        college:
          type: string
          description: 所属学院，可为空。
          nullable: true
          maxLength: 100
          example: 软件学院
        major:
          type: string
          description: 所属专业，可为空。
          nullable: true
          maxLength: 100
          example: 软件工程
        grade:
          type: string
          description: 年级，可为空。
          nullable: true
          maxLength: 20
          example: "2024"
      required:
        - username
        - password
        - realName
        - studentNo

    LoginRequest:
      type: object
      description: 用户登录请求，username 可填写用户名或学工号。
      properties:
        username:
          type: string
          description: 用户名或学工号。
          minLength: 1
          maxLength: 50
          example: stu_public
        password:
          type: string
          description: 登录密码。
          minLength: 1
          maxLength: 128
          example: ClubHub123
      required:
        - username
        - password

    AssignRoleRequest:
      type: object
      description: 为目标用户分配系统级或社团级角色。
      properties:
        operatorUserId:
          type: integer
          description: 发起分配操作的用户 ID。
          example: 1
        targetUserId:
          type: integer
          description: 被分配角色的用户 ID。
          example: 2
        roleCode:
          type: string
          description: 角色编码，例如 STUDENT、CLUB_MEMBER、SYSTEM_ADMIN。
          maxLength: 50
          example: CLUB_MEMBER
        clubId:
          type: integer
          description: 社团级角色所属社团 ID；系统级角色可为空。
          nullable: true
          example: 1
      required:
        - operatorUserId
        - targetUserId
        - roleCode

    AuthResponse:
      type: object
      description: 注册或登录成功后的认证响应。
      properties:
        token:
          type: string
          description: 登录演示令牌
          example: demo-token
        user:
          description: 当前登录用户信息。
          $ref: "#/components/schemas/AuthUser"
        roles:
          type: array
          description: 当前用户拥有的角色列表。
          items:
            $ref: "#/components/schemas/AuthRole"
        permissions:
          type: array
          description: 当前用户角色权限的并集。
          items:
            type: string
          example: ["profile:view", "public:view"]
      required:
        - token
        - user
        - roles
        - permissions

    AuthUser:
      type: object
      description: 认证上下文中的用户基础信息。
      properties:
        id:
          type: integer
          description: 用户 ID。
          example: 1
        username:
          type: string
          description: 登录用户名。
          example: stu_public
        realName:
          type: string
          description: 用户真实姓名。
          example: 张三
        studentNo:
          type: string
          description: 学工号；学生 7 位，教师 5 位。
          nullable: true
          example: "2450001"
        gender:
          type: string
          description: 性别。
          nullable: true
          example: 男
        phone:
          type: string
          description: 联系电话。
          nullable: true
          example: "13800138000"
        email:
          type: string
          description: 邮箱地址。
          nullable: true
          format: email
          example: zhangsan@example.com
        college:
          type: string
          description: 所属学院。
          nullable: true
          example: 软件学院
        major:
          type: string
          description: 所属专业。
          nullable: true
          example: 软件工程
        grade:
          type: string
          description: 年级。
          nullable: true
          example: "2024"
        accountStatus:
          type: string
          description: 账号状态，例如 normal 或 disabled。
          example: normal
      required:
        - id
        - username
        - realName
        - accountStatus

    AuthRole:
      type: object
      description: 用户在认证上下文中的角色及其权限。
      properties:
        id:
          type: integer
          description: 角色 ID。
          example: 3
        code:
          type: string
          description: 角色编码。
          example: CLUB_MEMBER
        name:
          type: string
          description: 角色名称。
          example: 社团成员
        displayName:
          type: string
          description: 前端展示用角色名称，例如“A社团成员”“A社团负责人”。
          example: 计算机协会成员
        scope:
          type: string
          description: 角色作用域，system 表示全局，club 表示社团范围。
          enum: [system, club]
          example: club
        clubId:
          type: integer
          description: 当前角色对应的单个社团 ID；全局角色为空。
          nullable: true
          example: 1
        clubIds:
          type: array
          description: 该角色覆盖的社团范围；用于展示和权限判断中的社团范围角色。
          items:
            type: integer
          example: [1]
        permissions:
          type: array
          description: 该角色授予的权限编码列表。
          items:
            type: string
          example: ["club:internal:view", "activity:checkin"]
        permissionDesc:
          type: string
          description: 角色权限说明。
          nullable: true
          example: 可查看社团内部信息并参与活动签到。
      required:
        - id
        - code
        - name
        - displayName
        - scope
        - clubIds
        - permissions

    RoleDefinition:
      type: object
      description: 系统预置角色定义。
      properties:
        code:
          type: string
          description: 角色编码。
          example: STUDENT
        name:
          type: string
          description: 角色名称。
          example: 普通学生
        scope:
          type: string
          description: 角色作用域。
          enum: [system, club]
          example: system
        description:
          type: string
          description: 角色业务说明。
          example: 注册后默认角色，可维护个人信息并浏览公开内容。
        permissions:
          type: array
          description: 角色拥有的权限编码列表。
          items:
            type: string
          example: ["profile:view", "public:view"]
      required:
        - code
        - name
        - scope
        - description
        - permissions

    PermissionDefinition:
      type: object
      description: 权限目录项。
      properties:
        code:
          type: string
          description: 权限编码。
          example: profile:view
        name:
          type: string
          description: 权限展示名称。
          example: 查看个人信息
        description:
          type: string
          description: 权限说明。
          example: 查看自己的账号、学工号和联系方式。
      required:
        - code
