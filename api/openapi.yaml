          example: 92
        taskScore:
          type: number
          format: decimal
          description: 项目任务得分，取值范围 0-100；学期考核由后端根据项目任务进度、完成状态和成果审核生成。
          example: 88
        learningScore:
          type: number
          format: decimal
          description: 学习记录得分，取值范围 0-100；学期考核由后端根据课程学习记录和进度生成。
