          type: string
          description: 考核或评奖所属学期。
          example: 2025-2026学年春季
        awardTitle:
          type: string
          nullable: true
          description: 评奖评优标题；学期考核时为空。
          example: 优秀社团干部
        awardLevel:
          type: string
          nullable: true
          description: 奖项等级；学期考核时为空。
          example: 校级
