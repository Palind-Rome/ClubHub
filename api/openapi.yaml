          description: 登录状态无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 当前用户没有场地预约申请或审批权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/venue-reservations/{reservationId}:
    get:
      summary: 获取场地预约详情
      operationId: getVenueReservationById
      security:
        - bearerAuth: []
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 场地预约详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VenueReservation"
        "401":
          description: 登录状态无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 当前用户没有查看该预约的权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 预约不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      summary: 删除场地预约
      operationId: deleteVenueReservation
      security:
        - bearerAuth: []
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 预约已删除
        "401":
          description: 登录状态无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 当前用户没有删除该预约的权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 预约不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: 已开始且未结束的已通过预约暂时无法删除
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/venue-reservations/{reservationId}/review:
    post:
      summary: 审批场地预约
      operationId: reviewVenueReservation
      security:
        - bearerAuth: []
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewVenueReservationRequest"
      responses:
        "200":
          description: 场地预约审批结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VenueReservation"
        "400":
          description: 请求参数不合法或预约状态不允许审批
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: 登录状态无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 当前用户没有场地预约审批权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 预约不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: 审批通过时发现同一场地存在时间重叠的已通过预约
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/learning/instructor-lookup:
    get:
      summary: 按学工号查询课程授课人
      description: 需要登录；在当前用户有权维护的社团范围内，按学号或工号精确查询正常状态的教师或学生。
      operationId: getLearningInstructorByUserNumber
      security:
        - bearerAuth: []
      parameters:
        - name: clubId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
          description: 需要发布或维护课程的社团 ID。
        - name: userNumber
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 30
          description: 要查询的学号或工号。
      responses:
        "200":
          description: 已找到的授课人。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningTeacherCandidate"
        "400":
          description: 社团 ID、学工号或账号状态无效。
        "403":
          description: 当前用户无权维护该社团的课程。
        "404":
          description: 当前用户、社团或对应的正常状态教师/学生不存在。

  /api/learning/items:
    get:
      summary: 获取可见的课程与学习资源
      description: 按当前角色的公开浏览、社团资源查看和资源维护权限，以及社团成员关系、授课人身份和资源可见范围过滤结果；教师或学生作为授课人的课程始终包含在其可见结果中。
      operationId: getLearningItems
      security:
        - bearerAuth: []
      parameters:
        - name: clubId
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: 可选的社团 ID 筛选条件。
      responses:
        "200":
          description: 当前用户可见的课程与学习资源列表。
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LearningItem"
        "400":
          description: 社团 ID 或资源筛选参数无效。
        "404":
          description: 当前用户不存在。
    post:
      summary: 发布课程或上传学习资源
      description: 拥有目标社团 resource:upload 权限的负责人、干部、指导老师或系统管理员可创建课程、视频、文档和资料资源。
      operationId: createLearningItem
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLearningItemRequest"
      responses:
        "201":
          description: 课程或学习资源创建成功。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningItem"
        "400":
          description: 请求参数、资源类型或排期无效。
        "403":
          description: 当前用户无权为目标社团发布内容。

  /api/learning/resources/upload:
    post:
      summary: 上传社团学习资源
      description: 拥有目标社团 resource:upload 权限的负责人、干部、指导老师或系统管理员可通过 multipart/form-data 将单个文件上传至私有阿里云 OSS 并创建学习资源；客户端可重复调用以完成批量上传。
      operationId: uploadLearningResource
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - clubId
                - file
                - visibility
                - downloadPermission
              properties:
                clubId:
                  type: integer
                  minimum: 1
                  description: 文件所属社团。
                file:
                  type: string
                  format: binary
                  description: 最大 50 MB 的资源文件。
                title:
                  type: string
                  minLength: 1
                  maxLength: 100
                  nullable: true
                  description: 可选的资源标题；未填写时使用原文件名。
                categoryName:
                  type: string
                  maxLength: 100
                  nullable: true
                  description: 可选的资源分类。
                description:
                  type: string
                  maxLength: 1000
                  nullable: true
                  description: 可选的资源内容摘要、用途、版本或注意事项。
                visibility:
                  type: string
                  enum: [public, club, department]
                  description: 资源可见范围。
                downloadPermission:
                  type: string
                  enum: [allow, deny, approval]
                  description: 资源下载设置。
      responses:
        "201":
          description: 文件上传并创建资源成功。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningItem"
        "400":
          description: 文件、社团或权限参数无效。
        "403":
          description: 当前用户无权为该社团上传资源。
        "404":
          description: 当前用户或社团不存在。
        "413":
          description: 文件超过 50 MB。
        "503":
          description: OSS、ECS RAM 角色临时凭据或存储桶不可用。

  /api/learning/items/{itemId}/file:
    get:
      summary: 获取受保护的学习资源文件
      description: 校验当前用户的资源可见范围和下载权限；OSS 资源由后端通过同地域内网 Endpoint 读取并流式返回，历史本地文件继续兼容。
      operationId: getLearningResourceFile
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: 文件内容。
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "403":
          description: 当前用户无权查看该资源。
        "404":
          description: 资源或物理文件不存在。
        "503":
          description: OSS、ECS RAM 角色临时凭据或对象读取暂不可用。

  /api/learning/items/{itemId}:
    put:
      summary: 更新课程或学习资源
      description: 当前仍拥有目标社团 resource:upload 权限的负责人、干部、指导老师或系统管理员，以及课程授课人，可维护资源元数据与权限设置；仅曾经上传过资源不构成持续授权。授课人身份不授予课程审核或加入权限。
      operationId: updateLearningItem
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLearningItemRequest"
      responses:
        "200":
          description: 课程或学习资源更新成功。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningItem"
        "400":
          description: 请求参数、资源类型、排期或状态无效。
        "403":
          description: 当前用户无权维护该内容。
        "404":
          description: 课程、学习资源或当前用户不存在。
        "409":
          description: 当前状态不允许执行本次更新。
    delete:
      summary: 删除课程或学习资源
      description: 当前拥有目标社团 resource:upload 权限的负责人、干部、指导老师，以及拥有 resource:delete 权限的社团管理员或系统管理员可删除课程或资源，并同步清理相关学习记录、OSS 对象或历史本地文件。
      operationId: deleteLearningResource
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "204":
          description: 资源已删除。
        "400":
          description: 目标是课程或资源编号无效。
        "403":
          description: 当前用户无权删除该资源。
        "404":
          description: 资源或当前用户不存在。
        "503":
          description: OSS、ECS RAM 角色临时凭据或对象删除暂不可用，数据库记录保持不变。

  /api/learning/items/{itemId}/review:
    post:
      summary: 审核课程或学习资源
      description: 拥有目标社团 resource:review 权限的指导老师、社团管理员或系统管理员审核待审核内容；通过后发布，驳回后保留为已驳回状态，发布者修改后可重新提交审核。审核人与时间写入操作日志。
      operationId: reviewLearningItem
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewLearningItemRequest"
      responses:
        "200":
          description: 审核结果已保存。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningItem"
        "400":
          description: 审核结果无效。
        "403":
          description: 当前用户没有审核权限或不能审核自己提交的内容。
        "404":
          description: 课程、资源或审核用户不存在。
        "409":
          description: 当前状态不允许审核。

  /api/learning/items/{itemId}/enrollments:
    post:
      summary: 加入培训课程
      description: 拥有 course:enroll 权限的学生加入有名额且对其可见的培训课程；教师和指导老师不能加入课程。
      operationId: enrollLearningItem
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "201":
          description: 已成功加入课程并创建学习记录。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningRecord"
        "400":
          description: 目标不是可报名课程或报名参数无效。
        "403":
          description: 当前用户没有课程报名权限、不可见该课程或不能报名本人授课的课程。
        "409":
          description: 已报名、课程名额已满或课程状态不允许报名。
        "404":
          description: 课程或当前用户不存在。
    delete:
      summary: 退出培训课程
      description: 当前登录用户在课程结束前退出尚未完成的课程。
      operationId: cancelLearningEnrollment
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: 已退出课程。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningRecord"
        "400":
          description: 目标不是可退出的课程，或课程已结束、学习已完成。
        "403":
          description: 当前用户无权退出该课程。
        "404":
          description: 课程、报名记录或当前用户不存在。

  /api/learning/items/{itemId}/learning:
    post:
      summary: 开始或继续学习资源
      description: 为当前登录用户创建或恢复视频、文档、资料的学习记录。
      operationId: startLearningItem
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: 已存在的学习记录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningRecord"
        "201":
          description: 新建或恢复的学习记录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningRecord"
        "400":
          description: 资源状态或类型不允许开始学习
        "403":
          description: 当前用户不在资源可见范围内
        "404":
          description: 学习资源不存在

  /api/learning/items/{itemId}/download:
    post:
      summary: 校验权限并记录学习资源下载
      description: 校验可见范围和下载设置，通过后记录下载用户、时间和 IP；OSS 文件返回受鉴权的后端文件地址，由后端读取私有对象并流式传输。
      operationId: downloadLearningItem
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: 下载权限校验通过且行为已记录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningDownloadResult"
        "400":
          description: 资源没有有效文件地址
        "403":
          description: 当前用户不可见该资源或资源不允许直接下载
        "404":
          description: 学习资源不存在

  /api/learning/items/{itemId}/statistics:
    get:
      summary: 获取学习资源统计
      description: 资源维护者、本社团负责人或指导老师可查看统计；拥有 stats:view 的社团管理员可查看跨社团匿名聚合统计，系统管理员拥有全局权限。
      operationId: getLearningItemStatistics
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: 学习资源统计
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningItemStatistics"
        "403":
          description: 当前用户无权查看该资源统计
        "404":
          description: 学习资源不存在

  /api/learning/records:
    get:
      summary: 获取学习记录
      description: 拥有 own:records:view 的当前用户可查看本人记录；资源维护者及拥有本社团运营或统计权限的负责人、干部、指导老师可查看指定资源的实名学习记录。stats:view 不授予实名名单访问权。
      operationId: getLearningRecords
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: 符合查询条件的学习记录列表。
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LearningRecord"
        "400":
          description: 资源 ID 无效。

  /api/learning/records/{recordId}/progress:
    put:
      summary: 更新学习进度和累计时长
      description: 当前登录用户只能更新自己的学习记录，进度达到 100 时自动标记完成。
      operationId: updateLearningProgress
      security:
        - bearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLearningProgressRequest"
      responses:
        "200":
          description: 学习进度更新成功。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningRecord"
        "400":
          description: 进度、学习时长或记录状态无效。
        "403":
          description: 当前用户无权更新该学习记录。
        "404":
          description: 学习记录或当前用户不存在。
  /api/materials:
    get:
      summary: List activity materials
      operationId: getMaterials
      security:
        - bearerAuth: []
      parameters:
        - name: clubId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, disabled]
      responses:
        "200":
          description: Materials visible to the current material manager.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Material"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Material management permission required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      summary: Create an activity material
      operationId: createMaterial
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaterialRequest"
      responses:
        "201":
          description: Material created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"
        "400":
          description: Invalid material payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Material management permission required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Club not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/materials/{materialId}:
    put:
      summary: Update an activity material
      operationId: updateMaterial
      security:
        - bearerAuth: []
      parameters:
        - name: materialId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMaterialRequest"
      responses:
        "200":
          description: Material updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"
        "400":
          description: Invalid material payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Material inventory permission required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Material not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/material-borrows:
    get:
      summary: List material borrow records
      operationId: getMaterialBorrows
      security:
        - bearerAuth: []
      parameters:
        - name: clubId
          in: query
          required: false
          schema:
            type: integer
        - name: materialId
          in: query
          required: false
          schema:
            type: integer
        - name: borrowerUserId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [borrowed, returned, damaged]
      responses:
        "200":
          description: Borrow records visible to the current material manager.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaterialBorrow"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Material management permission required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      summary: Register a material borrow
      operationId: borrowMaterial
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BorrowMaterialRequest"
      responses:
        "201":
          description: Borrow registered and available quantity reduced.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialBorrow"
        "400":
          description: Invalid borrow payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Material management permission required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Material or borrower not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Available material stock is not enough.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/material-borrows/{borrowId}/return:
    post:
      summary: Register material return
      operationId: returnMaterialBorrow
      security:
        - bearerAuth: []
      parameters:
        - name: borrowId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Return registered and available quantity restored.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialBorrow"
        "400":
          description: Borrow record is not in borrowed status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Material management permission required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Borrow record or material not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/material-borrows/{borrowId}/damage:
    post:
      summary: Register material damage
      operationId: damageMaterialBorrow
      security:
        - bearerAuth: []
      parameters:
        - name: borrowId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterMaterialDamageRequest"
      responses:
        "200":
          description: Damage registered with compensation amount.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialBorrow"
        "400":
          description: Invalid damage payload or borrow status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Material management permission required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Borrow record not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: ClubHub-HMAC
      description: 登录或注册成功后返回的 ClubHub Bearer 令牌。

  schemas:
    ApiError:
      type: object
      properties:
        code:
          type: string
          nullable: true
          example: venue_reservation_conflict
        message:
          type: string
          example: 该场地在所选时间段已有已通过预约。
        detail:
          type: string
          nullable: true
      required:
        - message

    HealthStatus:
      type: object
      properties:
        status:
          type: string
          example: healthy
        timestamp:
          type: string
          format: date-time
      required:
        - status
        - timestamp

    RegisterRequest:
      type: object
      description: 用户注册请求。学生学工号为 7 位数字，教师工号为 5 位数字。
      properties:
        username:
          type: string
          description: 登录用户名，注册后必须唯一。
          minLength: 3
          maxLength: 50
          example: stu_public
        password:
          type: string
          description: 登录密码，服务端仅保存密码摘要。
          minLength: 6
          maxLength: 128
          example: ClubHub123
        realName:
          type: string
          description: 用户真实姓名。
          minLength: 1
          maxLength: 50
          example: 张三
        studentNo:
          type: string
          description: 学工号；学生 7 位，教师 5 位。
          minLength: 5
          maxLength: 7
          pattern: "^([0-9]{7}|[0-9]{5})$"
          example: "2450001"
        gender:
          type: string
          description: 性别，可为空；当前支持男、女。
          nullable: true
          maxLength: 10
          pattern: "^(男|女)$"
          example: 男
        phone:
          type: string
          description: 联系电话，可为空。
          nullable: true
          maxLength: 20
          pattern: "^[0-9+\\-\\s()]{0,20}$"
          example: "13800138000"
        email:
          type: string
          description: 邮箱地址，可为空。
          nullable: true
          format: email
          maxLength: 100
          example: zhangsan@example.com
        college:
          type: string
          description: 所属学院，可为空。
          nullable: true
          maxLength: 100
          example: 软件学院
        major:
          type: string
          description: 所属专业，可为空。
          nullable: true
          maxLength: 100
          example: 软件工程
        grade:
          type: string
          description: 年级，可为空。
          nullable: true
          maxLength: 20
          example: "2024"
      required:
        - username
        - password
        - realName
        - studentNo

    LoginRequest:
      type: object
      description: 用户登录请求，username 可填写用户名或学工号。
      properties:
        username:
          type: string
          description: 用户名或学工号。
          minLength: 1
          maxLength: 50
          example: stu_public
        password:
          type: string
          description: 登录密码。
          minLength: 1
          maxLength: 128
          example: ClubHub123
      required:
        - username
        - password

    AssignRoleRequest:
      type: object
      description: 为目标用户分配系统级或社团级角色。
      properties:
        operatorUserId:
          type: integer
          description: 发起分配操作的用户 ID。
          example: 1
        targetUserId:
          type: integer
          description: 被分配角色的用户 ID。
          example: 2
        roleCode:
          type: string
          description: 角色编码，例如 STUDENT、CLUB_MEMBER、VENUE_ADMIN、SYSTEM_ADMIN。
          maxLength: 50
          example: CLUB_MEMBER
        clubId:
          type: integer
          description: 社团级角色所属社团 ID；系统级角色可为空。
          nullable: true
          example: 1
      required:
        - operatorUserId
        - targetUserId
        - roleCode

    AuthResponse:
      type: object
      description: 注册或登录成功后的认证响应。
      properties:
        token:
          type: string
          description: 登录令牌；调用需要当前登录态的接口时通过 Authorization Bearer 头传递。
          example: eyJ1c2VySWQiOjF9.abc123signature
        user:
          description: 当前登录用户信息。
          $ref: "#/components/schemas/AuthUser"
        roles:
          type: array
          description: 当前用户拥有的角色列表。
          items:
            $ref: "#/components/schemas/AuthRole"
        permissions:
          type: array
          description: 当前用户角色权限的并集。
          items:
            type: string
          example: ["profile:view", "public:view"]
      required:
        - token
        - user
        - roles
        - permissions

    AuthUser:
      type: object
      description: 认证上下文中的用户基础信息。
      properties:
        id:
          type: integer
          description: 用户 ID。
          example: 1
        username:
          type: string
          description: 登录用户名。
          example: stu_public
        realName:
          type: string
          description: 用户真实姓名。
          example: 张三
        studentNo:
          type: string
          description: 学工号；学生 7 位，教师 5 位。
          nullable: true
          example: "2450001"
        gender:
          type: string
          description: 性别。
          nullable: true
          example: 男
        phone:
          type: string
          description: 联系电话。
          nullable: true
          example: "13800138000"
        email:
          type: string
          description: 邮箱地址。
          nullable: true
          format: email
          example: zhangsan@example.com
        college:
          type: string
          description: 所属学院。
          nullable: true
          example: 软件学院
        major:
          type: string
          description: 所属专业。
          nullable: true
          example: 软件工程
        grade:
          type: string
          description: 年级。
          nullable: true
          example: "2024"
        accountStatus:
          type: string
          description: 账号状态，例如 normal 或 disabled。
          example: normal
      required:
        - id
        - username
        - realName
        - accountStatus

    AuthRole:
      type: object
      description: 用户在认证上下文中的角色及其权限。
      properties:
        id:
          type: integer
          description: 角色 ID。
          example: 3
        code:
          type: string
          description: 角色编码。
          example: CLUB_MEMBER
        name:
          type: string
          description: 角色名称。
          example: 社团成员
        displayName:
          type: string
          description: 前端展示用角色名称，例如“A社团成员”“A社团负责人”。
          example: 计算机协会成员
        scope:
          type: string
          description: 角色作用域，system 表示全局，club 表示社团范围。
          enum: [system, club]
          example: club
        clubId:
          type: integer
          description: 当前角色对应的单个社团 ID；全局角色为空。
          nullable: true
          example: 1
        clubIds:
          type: array
          description: 该角色覆盖的社团范围；用于展示和权限判断中的社团范围角色。
          items:
            type: integer
          example: [1]
        permissions:
          type: array
          description: 该角色授予的权限编码列表。
          items:
            type: string
          example: ["club:internal:view", "activity:checkin"]
        permissionDesc:
          type: string
          description: 角色权限说明。
          nullable: true
          example: 可查看社团内部信息并参与活动签到。
      required:
        - id
        - code
        - name
        - displayName
        - scope
        - clubIds
        - permissions

    RoleDefinition:
      type: object
      description: 系统预置角色定义。
      properties:
        code:
          type: string
          description: 角色编码。
          example: STUDENT
        name:
          type: string
          description: 角色名称。
          example: 普通学生
        scope:
          type: string
          description: 角色作用域。
          enum: [system, club]
          example: system
        description:
          type: string
          description: 角色业务说明。
          example: 注册后默认角色，可维护个人信息并浏览公开内容。
        permissions:
          type: array
          description: 角色拥有的权限编码列表。
          items:
            type: string
          example: ["profile:view", "public:view"]
      required:
        - code
        - name
        - scope
        - description
        - permissions

    PermissionDefinition:
      type: object
      description: 权限目录项。
      properties:
        code:
          type: string
          description: 权限编码。
          example: profile:view
        name:
          type: string
          description: 权限展示名称。
          example: 查看个人信息
        description:
          type: string
          description: 权限说明。
          example: 查看自己的账号、学工号和联系方式。
      required:
        - code
        - name
        - description

    Notice:
      type: object
      description: 公告通知及当前用户已读状态。
      properties:
        id:
          type: integer
          description: 通知 ID。
          example: 1
        clubId:
          type: integer
          description: 社团 ID；全校通知可为空。
          nullable: true
          example: 1
        clubName:
          type: string
          description: 社团名称。
          nullable: true
          example: 计算机协会
        publisherUserId:
          type: integer
          description: 发布人用户 ID。
          example: 2
        publisherName:
          type: string
          description: 发布人展示名称。
          nullable: true
          example: 李四
        noticeType:
          type: string
          description: 通知类型，例如 announcement、urgent、event。
          example: announcement
        title:
          type: string
          description: 通知标题。
          example: 本周例会通知
        content:
          type: string
          description: 通知正文。
          example: 请各位成员准时参加本周例会。
        targetType:
          type: string
          description: 定向类型。
          enum: [school, club, department, member]
          example: club
        targetId:
          type: integer
          description: 目标 ID；社团通知为 clubId，部门通知为成员任期 memberId，成员通知为 userId，全校通知为空。
          nullable: true
          example: 1
        targetName:
          type: string
          description: 前端展示用目标名称。
          nullable: true
          example: 计算机协会
        publishAt:
          type: string
          format: date-time
          description: 发布时间。
        expireAt:
          type: string
          format: date-time
          description: 过期时间。
          nullable: true
        noticeStatus:
          type: string
          description: 通知状态。
          enum: [draft, published, expired]
          example: published
        isRead:
          type: boolean
          description: 当前查看用户是否已读。
        readAt:
          type: string
          format: date-time
          description: 当前查看用户已读时间。
          nullable: true
        audienceCount:
          type: integer
          description: 当前规则下可接收该通知的用户数。
          nullable: true
          example: 28
        readCount:
          type: integer
          description: 已读人数。
          example: 12
      required:
        - id
        - publisherUserId
        - noticeType
        - title
        - content
        - targetType
        - publishAt
        - noticeStatus
        - isRead
        - readCount

    CreateNoticeRequest:
      type: object
      description: 发布公告通知请求。
      properties:
        currentUserId:
          type: integer
          minimum: 1
          example: 2
        noticeType:
          type: string
          description: 通知类型，例如 announcement、urgent、event。
          minLength: 1
          maxLength: 50
          example: announcement
        title:
          type: string
          description: 通知标题。
          minLength: 1
          maxLength: 120
          example: 本周例会通知
        content:
          type: string
          description: 通知正文。
          minLength: 1
          maxLength: 4000
          example: 请各位成员准时参加本周例会。
        targetType:
          type: string
          description: 定向类型。
          enum: [school, club, department, member]
          example: club
        clubId:
          type: integer
          description: 成员定向所属社团 ID；仅 member 定向需要作为社团上下文，全校、社团、部门定向可为空。
          nullable: true
          example: 1
        targetId:
          type: integer
          description: 目标 ID；school 为空，club 传目标社团 ID，department 传成员任期 memberId，member 传目标 userId。
          nullable: true
          example: 1
        expireAt:
          type: string
          format: date-time
          description: 过期时间，必须晚于发布时间。
          nullable: true
        noticeStatus:
          type: string
          description: 通知状态；默认 published。
          enum: [draft, published]
          default: published
          example: published
      required:
        - currentUserId
        - noticeType
        - title
        - content
        - targetType

    MarkNoticeReadRequest:
      type: object
      description: 标记通知已读请求。
      properties:
        currentUserId:
          type: integer
          minimum: 1
          example: 3
      required:
        - currentUserId
    NoticeReadResult:
      type: object
      description: 通知已读记录结果；接口成功响应表示该用户已经完成已读标记。
      properties:
        noticeId:
          type: integer
          description: 通知 ID。
          example: 1
        userId:
          type: integer
          description: 阅读用户 ID。
          example: 3
        isRead:
          type: boolean
          description: 是否已读；成功响应中始终为 true，不用于区分新写入或既有记录。
          example: true
        readAt:
          type: string
          format: date-time
          description: 已读时间。
      required:
        - currentUserId
        - noticeId
        - userId
        - isRead
        - readAt

    PermissionCheckResult:
      type: object
      description: 权限检查结果。
      properties:
        userId:
          type: integer
          description: 被检查的用户 ID。
          example: 1
        permission:
          type: string
          description: 被检查的权限编码。
          example: club:internal:view
        clubId:
          type: integer
          description: 权限检查涉及的社团 ID；全局权限可为空。
          nullable: true
          example: 1
        allowed:
          type: boolean
          description: 是否允许访问。
          example: true
        matchedRoles:
          type: array
          description: 命中该权限的角色列表。
          items:
            $ref: "#/components/schemas/AuthRole"
        message:
          type: string
          description: 面向调用方的判定说明。
          example: 允许访问。
      required:
        - userId
        - permission
        - allowed
        - matchedRoles
        - message

    RoleAssignmentResult:
      type: object
      description: 角色分配结果。
      properties:
        targetUserId:
          type: integer
          description: 被分配角色的用户 ID。
          example: 2
        role:
          description: 已分配或已存在的角色。
          $ref: "#/components/schemas/AuthRole"
        alreadyExists:
          type: boolean
          description: 该角色分配是否原本已存在。
          example: false
        message:
          type: string
          description: 角色分配结果说明。
          example: 角色分配成功。
      required:
        - targetUserId
        - role
        - alreadyExists
        - message

    Club:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        foundedAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          nullable: true
        statusText:
          type: string
        logoUrl:
          type: string
          nullable: true
        presidentUserId:
          type: integer
          nullable: true
        presidentName:
          type: string
          nullable: true
        advisorUserId:
          type: integer
          nullable: true
          description: 当前指导老师用户 ID，由 USER_ROLES 中 ADVISOR 社团角色关系推导。
        advisorName:
          type: string
          nullable: true
          description: 当前指导老师展示名称；优先由 ADVISOR 角色对应用户推导，历史数据可回退到社团文本字段。
        contactPhone:
          type: string
          nullable: true
          description: 社团对外联系电话或负责人联系电话。
          example: "021-65980000"
        auditStatus:
          type: string
          nullable: true
        auditStatusText:
          type: string
        applicantUserId:
          type: integer
          nullable: true
        applicantName:
          type: string
          nullable: true
        applyReason:
          type: string
          nullable: true
        materialUrl:
          type: string
          nullable: true
        reviewerUserId:
          type: integer
          nullable: true
        reviewerName:
          type: string
          nullable: true
        reviewComment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - statusText
        - auditStatusText
        - createdAt

    CreateClubRequest:
      type: object
      properties:
        currentUserId:
          type: integer
          deprecated: true
          description: 已废弃，服务端从 JWT 读取身份。
          minimum: 1
        name:
          type: string
          minLength: 1
        category:
          type: string
        description:
          type: string
          nullable: true
      required:
        - name
        - category

    UpdateClubRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        category:
          type: string
        description:
          type: string
          nullable: true

    UpdateClubProfileRequest:
      type: object
      properties:
        currentUserId:
          type: integer
          deprecated: true
          description: 已废弃，服务端从 JWT 读取身份。
          minimum: 1
        name:
          type: string
          minLength: 1
        category:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        presidentUserId:
          type: integer
          nullable: true
        advisorUserId:
          type: integer
          nullable: true
          description: 指导老师用户 ID；后端会校验该用户为教师账号，并维护本社团 ADVISOR 角色关系。
        advisorName:
          type: string
          nullable: true
          deprecated: true
          description: 历史兼容字段；新流程请使用 advisorUserId。
        contactPhone:
          type: string
