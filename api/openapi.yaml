          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivitySignRequest"
      responses:
        "200":
          description: 签到成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityParticipation"
        "400":
          description: 签到码、时间窗口或活动状态不合法
        "401":
          description: 当前用户未登录或登录状态已失效
        "403":
          description: 当前用户没有活动签到权限
        "404":
          description: 活动不存在

  /api/activities/{activityId}/checkout:
    post:
      summary: 活动签退
      description: 需要登录，并具备 activity:checkin 权限。签退用户由服务端从 Bearer 令牌解析。
      operationId: checkoutActivity
      security:
        - bearerAuth: []
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivitySignRequest"
      responses:
        "200":
          description: 签退成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityParticipation"
        "400":
          description: 签退码、时间窗口或活动状态不合法
        "401":
          description: 当前用户未登录或登录状态已失效
        "403":
          description: 当前用户没有活动签退权限
        "404":
          description: 活动不存在

  /api/users:
    get:
      summary: 获取当前账号可查看或可分配的用户列表
      operationId: getUsers
      security:
        - bearerAuth: []
      parameters:
        - name: clubId
          in: query
          required: false
