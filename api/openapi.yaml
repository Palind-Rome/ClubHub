      properties:
        id:
          type: integer
        activityId:
          type: integer
        userId:
          type: integer
        registerStatus:
          type: string
          nullable: true
        registeredAt:
          type: string
          format: date-time
          nullable: true
        checkinAt:
          type: string
          format: date-time
          nullable: true
        checkoutAt:
          type: string
          format: date-time
          nullable: true
        signStatus:
          type: string
          nullable: true
        remark:
          type: string
          nullable: true
      required:
        - id
        - activityId
        - userId

    Venue:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        building:
          type: string
          nullable: true
        roomNo:
          type: string
          nullable: true
        capacity:
          type: integer
        status:
          type: string
          enum: [available, disabled, maintenance]
        managerUserId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        maintenanceUntil:
          type: string
          format: date-time
          nullable: true
          description: 维护结束时间。为空表示维护结束时间未知。
      required:
        - id
        - name
        - capacity
        - status
        - createdAt

    CreateVenueRequest:
      type: object
      properties:
        operatorUserId:
          type: integer
          description: 执行创建操作的用户 ID，用于校验 venue:create 权限。
        name:
          type: string
          maxLength: 255
        building:
          type: string
          nullable: true
          maxLength: 255
        roomNo:
          type: string
          nullable: true
          maxLength: 255
        capacity:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [available, disabled, maintenance]
          default: available
        managerUserId:
          type: integer
          nullable: true
      required:
        - operatorUserId
        - name
        - capacity

    UpdateVenueRequest:
      type: object
      properties:
        operatorUserId:
          type: integer
          description: 执行维护操作的用户 ID，用于校验 venue:update 权限。
        name:
          type: string
          maxLength: 255
        building:
          type: string
          nullable: true
          maxLength: 255
        roomNo:
          type: string
          nullable: true
          maxLength: 255
        capacity:
          type: integer
          minimum: 1
        managerUserId:
          type: integer
          nullable: true
      required:
        - operatorUserId
        - name
        - capacity

    UpdateVenueStatusRequest:
      type: object
      properties:
        operatorUserId:
          type: integer
          description: 执行状态变更操作的用户 ID，用于校验 venue:disable 权限。
        status:
          type: string
          enum: [available, disabled, maintenance]
        maintenanceUntil:
          type: string
          format: date-time
          nullable: true
          description: status 为 maintenance 时可选填写的维护结束时间。
        cancelConflictingReservations:
          type: boolean
          nullable: true
          description: 若状态变更与后续预约冲突，是否自动取消这些冲突预约。
      required:
        - operatorUserId
        - status

    DeleteVenueRequest:
      type: object
      properties:
        operatorUserId:
          type: integer
          description: 执行删除操作的用户 ID，用于校验 venue:disable 权限。
      required:
        - operatorUserId

    DeleteVenueReservationRequest:
      type: object
      properties:
        operatorUserId:
          type: integer
          description: 执行删除预约操作的用户 ID。预约申请人可删除自己的预约，场地管理员可删除任意预约。
      required:
        - operatorUserId

    VenueReservation:
      type: object
      properties:
        id:
          type: integer
        venueId:
          type: integer
        venueName:
          type: string
        clubId:
          type: integer
        clubName:
          type: string
        activityId:
          type: integer
          nullable: true
        activityTitle:
          type: string
          nullable: true
        applicantUserId:
          type: integer
        applicantName:
          type: string
          nullable: true
        startTime:
          type: string
          format: date-time
          description: 预约开始时间。响应统一返回 UTC 时间戳，前端按北京时间展示。
        endTime:
          type: string
          format: date-time
          description: 预约结束时间。响应统一返回 UTC 时间戳，前端按北京时间展示。
        purpose:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected, cancelled]
        reviewerUserId:
          type: integer
          nullable: true
        reviewerName:
          type: string
          nullable: true
        reviewComment:
          type: string
          nullable: true
          maxLength: 255
        createdAt:
          type: string
          format: date-time
          description: 创建时间。响应统一返回 UTC 时间戳，前端按北京时间展示。
      required:
        - id
        - venueId
        - venueName
        - clubId
        - clubName
        - applicantUserId
        - startTime
        - endTime
        - purpose
        - status
        - createdAt

    CreateVenueReservationRequest:
      type: object
      properties:
        venueId:
          type: integer
        clubId:
          type: integer
        activityId:
          type: integer
          nullable: true
        applicantUserId:
          type: integer
        startTime:
          type: string
          format: date-time
          description: 预约开始时间。带时区时按对应瞬时转换；无时区时按北京时间解析。
        endTime:
          type: string
          format: date-time
          description: 预约结束时间。带时区时按对应瞬时转换；无时区时按北京时间解析。
        purpose:
          type: string
          minLength: 1
          maxLength: 255
      required:
        - venueId
        - clubId
        - applicantUserId
        - startTime
        - endTime
        - purpose

    ReviewVenueReservationRequest:
      type: object
      properties:
        reviewerUserId:
          type: integer
        approved:
          type: boolean
        reviewComment:
          type: string
          nullable: true
          maxLength: 255
      required:
        - reviewerUserId
        - approved

    Project:
      type: object
      description: Project initiation application and review result.
      properties:
        id:
          type: integer
          description: Project id in PROJECTS.PROJECT_ID.
          example: 1001
        clubId:
          type: integer
          description: Club that owns the project application.
          example: 1
        projectName:
          type: string
          description: Project name submitted by the club.
          example: 校园公益服务项目
        description:
          type: string
          description: Optional project description.
          example: 组织社团成员开展校园公益服务。
          nullable: true
        leaderUserId:
          type: integer
          description: Optional project leader user id.
          example: 12
          nullable: true
        startDate:
          type: string
          format: date-time
          description: Planned project start time.
          example: "2026-07-15T09:00:00Z"
        endDate:
          type: string
          format: date-time
          description: Optional planned project end time.
          example: "2026-08-15T18:00:00Z"
          nullable: true
        projectStatus:
          type: string
          enum: [pending, running, finished, delayed, closed]
          description: Current project status.
          example: pending
        reviewerUserId:
          type: integer
          description: User id of the reviewer after approval or rejection.
          example: 3
          nullable: true
        reviewComment:
          type: string
          description: Optional reviewer comment.
          example: 立项材料完整，同意执行。
          nullable: true
        createdAt:
          type: string
          format: date-time
          description: Project application creation time.
          example: "2026-07-08T12:00:00Z"
      required:
        - id
        - clubId
        - projectName
        - startDate
        - projectStatus
        - createdAt

    CreateProjectRequest:
      type: object
      description: Request body for creating a project initiation application.
      properties:
        currentUserId:
          type: integer
          description: 当前提交立项申请的用户 ID；后端据此校验其是否为本社团负责人或指导老师。
          minimum: 1
          example: 12
        clubId:
          type: integer
          description: Club that submits the project application.
          minimum: 1
          example: 1
        projectName:
          type: string
          description: Project name.
          minLength: 1
          maxLength: 100
          example: 校园公益服务项目
        description:
          type: string
          description: Optional project description.
          example: 组织社团成员开展校园公益服务。
          nullable: true
        leaderUserId:
          type: integer
          description: Optional project leader user id.
          minimum: 1
          example: 12
          nullable: true
        startDate:
          type: string
          format: date-time
          description: Planned project start time.
          example: "2026-07-15T09:00:00Z"
        endDate:
          type: string
          format: date-time
          description: Optional planned project end time.
          example: "2026-08-15T18:00:00Z"
          nullable: true
      required:
        - currentUserId
        - clubId
        - projectName
        - startDate

    AssignProjectLeaderRequest:
      type: object
      description: Request body for assigning or changing a project leader.
      properties:
        currentUserId:
          type: integer
          description: 当前分配负责人操作用户 ID；仅本社团负责人或干部可操作。
          minimum: 1
          example: 7
        leaderUserId:
          type: integer
          description: User id of an active club member.
          minimum: 1
          example: 12
      required:
        - currentUserId
        - leaderUserId

    ReviewProjectRequest:
      type: object
      description: Request body for reviewing a project initiation application.
      properties:
        currentUserId:
          type: integer
          description: 当前审核操作用户 ID；仅本社团指导老师可审核。
          minimum: 1
          example: 3
        projectStatus:
          type: string
          enum: [running, closed]
          description: Review result. running means approved; closed means rejected or closed.
          example: running
        reviewComment:
          type: string
          description: Optional review comment.
          example: 立项材料完整，同意执行。
          nullable: true
      required:
        - currentUserId
        - projectStatus

    CancelProjectRequest:
      type: object
      description: Request body for canceling a pending or running project.
      properties:
        currentUserId:
          type: integer
          description: 当前撤销操作用户 ID；系统管理员可撤销待审核/进行中项目，本社团负责人可撤销待审核申请，校级社团管理员可撤销进行中项目。
          minimum: 1
          example: 12
        cancelReason:
          type: string
          description: Optional applicant cancellation reason.
          maxLength: 200
          example: 申请材料需要补充，暂时撤销。
          nullable: true
      required:
        - currentUserId

    ActivityRegistrationResult:
      type: object
      properties:
        participationId:
          type: integer
          description: 活动参与记录 ID
        activityId:
          type: integer
        userId:
          type: integer
        registerStatus:
          type: string
          enum: [pending, accepted, cancelled, rejected]
        registeredAt:
          type: string
          format: date-time
        currentParticipants:
          type: integer
          description: 报名成功后的当前有效报名人数
        message:
          type: string
          example: 报名成功
      required:
        - participationId
        - activityId
        - userId
        - registerStatus
        - registeredAt
        - currentParticipants
        - message
