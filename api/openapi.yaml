components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: ClubHub-HMAC
      description: 登录或注册成功后返回的 ClubHub Bearer 令牌。

  schemas:
    ApiError:
      type: object
      properties:
        code:
          type: string
          nullable: true
          example: venue_reservation_conflict
        message:
          type: string
          example: 该场地在所选时间段已有已通过预约。
        detail:
          type: string
          nullable: true
      required:
        - message

    HealthStatus:
      type: object
      properties:
        status:
          type: string
          example: healthy
        timestamp:
          type: string
          format: date-time
      required:
        - status
        - timestamp

    RegisterRequest:
      type: object
      description: 用户注册请求。学生学工号为 7 位数字，教师工号为 5 位数字。
      properties:
        username:
          type: string
          description: 登录用户名，注册后必须唯一。
          minLength: 3
          maxLength: 50
          example: stu_public
        password:
          type: string
          description: 登录密码，服务端仅保存密码摘要。
          minLength: 6
          maxLength: 128
          example: ClubHub123
        realName:
          type: string
          description: 用户真实姓名。
          minLength: 1
          maxLength: 50
          example: 张三
        studentNo:
          type: string
          description: 学工号；学生 7 位，教师 5 位。
          minLength: 5
          maxLength: 7
          pattern: "^([0-9]{7}|[0-9]{5})$"
          example: "2450001"
        gender:
          type: string
          description: 性别，可为空；当前支持男、女。
          nullable: true
          maxLength: 10
          pattern: "^(男|女)$"
          example: 男
        phone:
          type: string
          description: 联系电话，可为空。
          nullable: true
          maxLength: 20
          pattern: "^[0-9+\\-\\s()]{0,20}$"
          example: "13800138000"
        email:
          type: string
          description: 邮箱地址，可为空。
          nullable: true
          format: email
          maxLength: 100
          example: zhangsan@example.com
        college:
          type: string
          description: 所属学院，可为空。
          nullable: true
          maxLength: 100
          example: 软件学院
        major:
          type: string
          description: 所属专业，可为空。
          nullable: true
          maxLength: 100
          example: 软件工程
        grade:
          type: string
          description: 年级，可为空。
          nullable: true
          maxLength: 20
          example: "2024"
      required:
        - username
        - password
        - realName
        - studentNo

    LoginRequest:
      type: object
      description: 用户登录请求，username 可填写用户名或学工号。
      properties:
        username:
          type: string
          description: 用户名或学工号。
          minLength: 1
          maxLength: 50
          example: stu_public
        password:
          type: string
          description: 登录密码。
          minLength: 1
          maxLength: 128
          example: ClubHub123
      required:
        - username
        - password

    AssignRoleRequest:
      type: object
      description: 为目标用户分配系统级或社团级角色。
      properties:
        operatorUserId:
          type: integer
          description: 发起分配操作的用户 ID。
          example: 1
        targetUserId:
          type: integer
          description: 被分配角色的用户 ID。
          example: 2
        roleCode:
          type: string
          description: 角色编码，例如 STUDENT、CLUB_MEMBER、VENUE_ADMIN、SYSTEM_ADMIN。
          maxLength: 50
          example: CLUB_MEMBER
        clubId:
          type: integer
          description: 社团级角色所属社团 ID；系统级角色可为空。
          nullable: true
          example: 1
      required:
        - operatorUserId
        - targetUserId
        - roleCode

    AuthResponse:
      type: object
      description: 注册或登录成功后的认证响应。
      properties:
        token:
          type: string
          description: 登录令牌；调用需要当前登录态的接口时通过 Authorization Bearer 头传递。
          example: eyJ1c2VySWQiOjF9.abc123signature
        user:
          description: 当前登录用户信息。
          $ref: "#/components/schemas/AuthUser"
        roles:
          type: array
          description: 当前用户拥有的角色列表。
          items:
            $ref: "#/components/schemas/AuthRole"
        permissions:
          type: array
          description: 当前用户角色权限的并集。
          items:
            type: string
          example: ["profile:view", "public:view"]
      required:
        - token
        - user
        - roles
        - permissions

    AuthUser:
      type: object
      description: 认证上下文中的用户基础信息。
      properties:
        id:
          type: integer
          description: 用户 ID。
          example: 1
        username:
          type: string
          description: 登录用户名。
          example: stu_public
        realName:
          type: string
          description: 用户真实姓名。
          example: 张三
        studentNo:
          type: string
          description: 学工号；学生 7 位，教师 5 位。
          nullable: true
          example: "2450001"
        gender:
          type: string
          description: 性别。
          nullable: true
          example: 男
        phone:
          type: string
          description: 联系电话。
          nullable: true
          example: "13800138000"
        email:
          type: string
          description: 邮箱地址。
          nullable: true
          format: email
          example: zhangsan@example.com
        college:
          type: string
          description: 所属学院。
          nullable: true
          example: 软件学院
        major:
          type: string
          description: 所属专业。
          nullable: true
          example: 软件工程
        grade:
          type: string
          description: 年级。
          nullable: true
          example: "2024"
        accountStatus:
          type: string
          description: 账号状态，例如 normal 或 disabled。
          example: normal
      required:
        - id
        - username
        - realName
        - accountStatus

    AuthRole:
      type: object
      description: 用户在认证上下文中的角色及其权限。
      properties:
        id:
          type: integer
          description: 角色 ID。
          example: 3
        code:
          type: string
          description: 角色编码。
          example: CLUB_MEMBER
        name:
          type: string
          description: 角色名称。
          example: 社团成员
        displayName:
          type: string
          description: 前端展示用角色名称，例如“A社团成员”“A社团负责人”。
          example: 计算机协会成员
        scope:
          type: string
          description: 角色作用域，system 表示全局，club 表示社团范围。
          enum: [system, club]
          example: club
        clubId:
          type: integer
          description: 当前角色对应的单个社团 ID；全局角色为空。
          nullable: true
          example: 1
        clubIds:
          type: array
          description: 该角色覆盖的社团范围；用于展示和权限判断中的社团范围角色。
          items:
            type: integer
          example: [1]
        permissions:
          type: array
          description: 该角色授予的权限编码列表。
          items:
            type: string
          example: ["club:internal:view", "activity:checkin"]
        permissionDesc:
          type: string
          description: 角色权限说明。
          nullable: true
          example: 可查看社团内部信息并参与活动签到。
      required:
        - id
        - code
        - name
        - displayName
        - scope
        - clubIds
        - permissions

    RoleDefinition:
      type: object
      description: 系统预置角色定义。
      properties:
        code:
          type: string
          description: 角色编码。
          example: STUDENT
        name:
          type: string
          description: 角色名称。
          example: 普通学生
        scope:
          type: string
          description: 角色作用域。
          enum: [system, club]
          example: system
        description:
          type: string
          description: 角色业务说明。
          example: 注册后默认角色，可维护个人信息并浏览公开内容。
        permissions:
          type: array
          description: 角色拥有的权限编码列表。
          items:
            type: string
          example: ["profile:view", "public:view"]
      required:
        - code
        - name
        - scope
        - description
        - permissions

    PermissionDefinition:
      type: object
      description: 权限目录项。
      properties:
        code:
          type: string
          description: 权限编码。
          example: profile:view
        name:
          type: string
          description: 权限展示名称。
          example: 查看个人信息
        description:
          type: string
          description: 权限说明。
          example: 查看自己的账号、学工号和联系方式。
      required:
        - code
        - name
        - description

    Notice:
      type: object
      description: 公告通知及当前用户已读状态。
      properties:
        id:
          type: integer
          description: 通知 ID。
          example: 1
        clubId:
          type: integer
          description: 社团 ID；全校通知可为空。
          nullable: true
          example: 1
        clubName:
          type: string
          description: 社团名称。
          nullable: true
          example: 计算机协会
        publisherUserId:
          type: integer
          description: 发布人用户 ID。
          example: 2
        publisherName:
          type: string
          description: 发布人展示名称。
          nullable: true
          example: 李四
        noticeType:
          type: string
          description: 通知类型，例如 announcement、urgent、event。
          example: announcement
        title:
          type: string
          description: 通知标题。
          example: 本周例会通知
        content:
          type: string
          description: 通知正文。
          example: 请各位成员准时参加本周例会。
        targetType:
          type: string
          description: 定向类型。
          enum: [school, club, department, member]
          example: club
        targetId:
          type: integer
          description: 目标 ID；社团通知为 clubId，部门通知为成员任期 memberId，成员通知为 userId，全校通知为空。
          nullable: true
          example: 1
        targetName:
          type: string
          description: 前端展示用目标名称。
          nullable: true
          example: 计算机协会
        publishAt:
          type: string
          format: date-time
          description: 发布时间。
        expireAt:
          type: string
          format: date-time
          description: 过期时间。
          nullable: true
        noticeStatus:
          type: string
          description: 通知状态。
          enum: [draft, published, expired]
          example: published
        isRead:
          type: boolean
          description: 当前查看用户是否已读。
        readAt:
          type: string
          format: date-time
          description: 当前查看用户已读时间。
          nullable: true
        audienceCount:
          type: integer
          description: 当前规则下可接收该通知的用户数。
          nullable: true
          example: 28
        readCount:
          type: integer
          description: 已读人数。
          example: 12
      required:
        - id
        - publisherUserId
        - noticeType
        - title
        - content
        - targetType
        - publishAt
        - noticeStatus
        - isRead
        - readCount

    CreateNoticeRequest:
      type: object
      description: 发布公告通知请求。
      properties:
        currentUserId:
          type: integer
          minimum: 1
          example: 2
        noticeType:
          type: string
          description: 通知类型，例如 announcement、urgent、event。
          minLength: 1
          maxLength: 50
          example: announcement
        title:
          type: string
          description: 通知标题。
          minLength: 1
          maxLength: 120
          example: 本周例会通知
        content:
          type: string
          description: 通知正文。
          minLength: 1
          maxLength: 4000
          example: 请各位成员准时参加本周例会。
        targetType:
          type: string
          description: 定向类型。
          enum: [school, club, department, member]
          example: club
        clubId:
          type: integer
          description: 成员定向所属社团 ID；仅 member 定向需要作为社团上下文，全校、社团、部门定向可为空。
          nullable: true
          example: 1
        targetId:
          type: integer
          description: 目标 ID；school 为空，club 传目标社团 ID，department 传成员任期 memberId，member 传目标 userId。
          nullable: true
          example: 1
        expireAt:
          type: string
          format: date-time
          description: 过期时间，必须晚于发布时间。
          nullable: true
        noticeStatus:
          type: string
          description: 通知状态；默认 published。
          enum: [draft, published]
          default: published
          example: published
      required:
        - currentUserId
        - noticeType
        - title
        - content
        - targetType

    MarkNoticeReadRequest:
      type: object
      description: 标记通知已读请求。
      properties:
        currentUserId:
          type: integer
          minimum: 1
          example: 3
      required:
        - currentUserId
    NoticeReadResult:
      type: object
      description: 通知已读记录结果；接口成功响应表示该用户已经完成已读标记。
      properties:
        noticeId:
          type: integer
          description: 通知 ID。
          example: 1
        userId:
          type: integer
          description: 阅读用户 ID。
          example: 3
        isRead:
          type: boolean
          description: 是否已读；成功响应中始终为 true，不用于区分新写入或既有记录。
          example: true
        readAt:
          type: string
          format: date-time
          description: 已读时间。
      required:
        - currentUserId
        - noticeId
        - userId
        - isRead
        - readAt

    PermissionCheckResult:
      type: object
      description: 权限检查结果。
      properties:
        userId:
          type: integer
          description: 被检查的用户 ID。
          example: 1
        permission:
          type: string
