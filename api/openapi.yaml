openapi: 3.0.3
info:
  title: ClubHub API
  description: |
    ClubHub 高校社团运营与协同管理平台 API。

    **API-first 开发流程**：修改本文件 → push → CI 自动生成前后端代码 →
    git pull 拉取生成代码 → 在 Controller / Services / Vue 组件中手写业务逻辑。
  version: 0.1.0

servers:
  - url: http://localhost:5000
    description: 本地开发服务器

paths:
  /api/health:
    get:
      summary: 健康检查
      operationId: healthCheck
      responses:
        "200":
          description: 服务正常运行
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /api/auth/register:
    post:
      summary: 用户注册
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: 注册信息不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: 用户名或学工号已存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/login:
    post:
      summary: 用户登录
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功，返回用户和角色信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: 登录信息不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: 用户名/学工号或密码错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 账号已被禁用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/session:
    get:
      summary: 刷新当前用户会话
      description: 依据 Bearer 登录令牌中的当前用户重新计算角色、社团身份和权限，用于成员身份变化后的前端会话同步。
      operationId: refreshAuthSession
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 已重新计算的用户会话
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: 登录状态缺失或令牌无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 账号已被禁用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/roles:
    get:
      summary: 获取基础角色定义
      operationId: getRoleDefinitions
      responses:
        "200":
          description: 基础角色列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoleDefinition"

  /api/auth/permissions:
    get:
      summary: 获取权限目录
      operationId: getPermissionCatalog
      responses:
        "200":
          description: 权限目录
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PermissionDefinition"

  /api/auth/permissions/check:
    get:
      summary: 检查用户是否拥有指定权限
      operationId: checkPermission
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
        - name: permission
          in: query
          required: true
          schema:
            type: string
        - name: clubId
          in: query
          required: false
          description: Optional club id filter.
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: 权限判断结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionCheckResult"
        "400":
          description: 请求参数不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/roles/assign:
    post:
      summary: 分配用户角色
      operationId: assignUserRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignRoleRequest"
      responses:
        "200":
          description: 角色分配成功或已存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleAssignmentResult"
        "400":
          description: 请求参数不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 操作人没有角色分配权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 用户或角色不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/notices:
    get:
      summary: 查询公告通知
      description: 按当前用户权限返回面向全校、社团、部门或成员的有效通知，并附带已读状态。
      operationId: getNotices
      parameters:
        - name: viewerUserId
          in: query
          required: true
          description: 当前登录用户 ID（临时兼容，待 NoticesController 迁移至 JWT 后移除）。
          schema:
            type: integer
            minimum: 1
        - name: noticeStatus
          in: query
          required: false
          description: 公告状态筛选；默认返回 published。
          schema:
            type: string
            enum: [draft, published, expired]
            default: published
        - name: targetType
          in: query
          required: false
          description: 定向类型筛选。
          schema:
            type: string
            enum: [school, club, department, member]
        - name: clubId
          in: query
          required: false
          description: 社团上下文筛选。
          schema:
            type: integer
        - name: unreadOnly
          in: query
          required: false
          description: 是否仅返回未读通知。
          schema:
            type: boolean
      responses:
        "200":
          description: 当前用户可见的公告通知列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notice"
        "400":
          description: 查询参数不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 当前用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      summary: 发布公告通知
      description: 发布面向全校、指定社团、指定部门或指定成员的通知，并校验发布人权限和目标对象。
      operationId: createNotice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoticeRequest"
      responses:
        "201":
          description: 公告通知已发布
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notice"
        "400":
          description: 请求内容不符合业务规则
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 当前用户没有发布权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 发布人、社团或目标对象不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/notices/{noticeId}/reads:
    post:
      summary: 标记通知已读
      description: 当前用户阅读可见通知后写入已读记录；重复标记会返回已有记录。
      operationId: markNoticeRead
      parameters:
        - name: noticeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkNoticeReadRequest"
      responses:
        "200":
          description: 已读记录已存在或已写入
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoticeReadResult"
        "400":
          description: 当前用户缺失
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 当前用户不可阅读该通知
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 当前用户或通知不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/clubs:
    get:
      summary: 获取社团列表
      operationId: getClubs
      responses:
        "200":
          description: 社团列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Club"
    post:
      summary: 创建社团
      operationId: createClub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClubRequest"
      responses:
        "201":
          description: 社团已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
        "400":
          description: 当前用户缺失、账号不可用或请求内容不合法
        "403":
          description: 仅平台管理员可以直接创建社团
        "404":
          description: 当前操作用户不存在
        "409":
          description: 社团名称已存在或已有有效注册申请

  /api/clubs/advisor-candidates:
    get:
      summary: 查询社团注册可选指导老师
      description: 学生提交社团注册申请时使用，返回正常状态的教师或指导老师账号候选。
      operationId: getClubAdvisorCandidates
      responses:
        "200":
          description: 可选指导老师列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LearningTeacherCandidate"
        "400":
          description: 当前用户账号不可用
        "401":
          description: 登录状态已失效
        "404":
          description: 当前用户不存在

  /api/clubs/applications:
    get:
      summary: 按当前用户权限查询社团注册申请
      operationId: getClubApplications
      parameters:
        - name: auditStatus
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected]
          example: pending
        - name: keyword
          in: query
          required: false
          description: 按社团名称、申请人姓名、用户名或学号模糊搜索。
          schema:
            type: string
          example: 计算机协会
        - name: startDate
          in: query
          required: false
          description: 申请提交开始日期，按业务时区当天 00:00 起过滤。
          schema:
            type: string
            format: date
          example: "2026-07-01"
        - name: endDate
          in: query
          required: false
          description: 申请提交结束日期，按业务时区包含当天。
          schema:
            type: string
            format: date
          example: "2026-07-13"
      responses:
        "200":
          description: 社团注册申请列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClubApplication"
        "400":
          description: 当前用户缺失或审核状态不合法
        "404":
          description: 当前用户不存在
    post:
      summary: 提交社团注册申请
      description: 仅学生角色可以提交社团注册申请；平台管理员、指导老师等非学生角色不能通过该入口发起申请。
      operationId: createClubApplication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClubApplicationRequest"
      responses:
        "201":
          description: 社团注册申请已提交
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubApplication"
        "400":
          description: 请求内容不符合业务规则
        "404":
          description: 当前用户不存在
        "403":
          description: 当前用户不是学生申请人或无权提交申请
        "409":
          description: 社团名称已存在或已有待审核申请

  /api/clubs/applications/{clubId}:
    patch:
      summary: 修改退回的社团注册申请并重新提交
      description: 仅原申请人可以修改已退回的社团注册申请；提交后申请状态重新变为待审核，并保留原退回意见供申请人与审核人参考。
      operationId: resubmitClubApplication
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClubApplicationRequest"
      responses:
        "200":
          description: 社团注册申请已重新提交
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubApplication"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户不是原申请人或无权提交申请
        "404":
          description: 当前用户或申请不存在
        "409":
          description: 当前申请状态不允许重新提交，或社团名称已被占用

  /api/clubs/applications/{clubId}/review:
    patch:
      summary: 平台管理员审核社团注册申请
      operationId: reviewClubApplication
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewClubApplicationRequest"
      responses:
        "200":
          description: 审核结果已保存
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubApplication"
        "400":
          description: 审核内容不符合业务规则
        "404":
          description: 当前用户或申请不存在
        "409":
          description: 当前申请状态不允许审核
        "403":
          description: 当前用户没有审核权限

  /api/clubs/{clubId}:
    get:
      summary: 获取社团详情
      operationId: getClubById
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 社团详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
    put:
      summary: 更新社团
      operationId: updateClub
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClubRequest"
      responses:
        "200":
          description: 社团已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
  /api/clubs/{clubId}/dissolve:
    patch:
      summary: 解散社团
      description: 社团管理员或系统管理员可以解散社团；系统保留社团档案和成员任期历史，将社团状态标记为 inactive。
      operationId: dissolveClub
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DissolveClubRequest"
      responses:
        "204":
          description: 社团已解散
        "400":
          description: 当前用户或社团状态不符合业务规则
        "403":
          description: 当前用户没有解散社团权限
        "404":
          description: 当前用户或社团不存在
        "409":
          description: 社团已解散或当前状态不允许解散

  /api/clubs/{clubId}/profile:
    patch:
      summary: 维护社团基础信息
      description: 系统管理员、本社团负责人或指导老师可以维护社团简介、联系方式、指导老师和负责人信息；社团管理员只处理社团注册审核和社团状态管理，不参与社团内部档案维护。
      operationId: updateClubProfile
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClubProfileRequest"
      responses:
        "200":
          description: 社团基础信息已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有维护该社团的权限
        "404":
          description: 当前用户、社团或负责人不存在
        "409":
          description: 社团状态不允许维护或社团名称冲突

  /api/clubs/{clubId}/members:
    get:
      summary: 查询社团成员与干部任期记录
      description: 系统管理员、社团管理员、本社团负责人、干部、成员和指导老师可以只读查看成员及任期；默认仅返回当前有效记录，可选择包含历史记录，并可按届、部门或小组筛选。社团管理员不参与内部任期维护。
      operationId: getClubMembers
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: includeHistory
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: departmentId
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            example: 1001
          description: 按 CLUB_MEMBERS.department_id 精确筛选；新流程优先使用该字段。
        - name: groupId
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            example: 2001
          description: 按 CLUB_MEMBERS.group_id 精确筛选；需要与 departmentId 对应的小组。
        - name: departmentName
          in: query
          required: false
          schema:
            type: string
            example: "宣传部"
          description: 按 CLUB_MEMBERS.department_name 精确筛选；保留用于历史兼容。
        - name: groupName
          in: query
          required: false
          schema:
            type: string
            example: "摄影组"
          description: 按 CLUB_MEMBERS.group_name 精确筛选；保留用于历史兼容。
        - name: termName
          in: query
          required: false
          schema:
            type: string
            example: "2026-2027学年"
          description: 按 CLUB_MEMBERS.term_name 精确筛选，例如 2026-2027学年。
      responses:
        "200":
          description: 社团成员与任期记录列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClubMemberRecord"
        "403":
          description: 当前用户没有查看该社团成员的权限
        "404":
          description: 当前用户或社团不存在

  /api/clubs/{clubId}/departments:
    get:
      summary: 查询社团部门和小组
      description: 查看某个社团的部门与其下属小组，供成员管理级联选择和组织架构维护使用。
      operationId: getClubDepartments
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: includeInactive
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: 是否包含已停用的部门和小组。
      responses:
        "200":
          description: 社团部门与小组列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClubDepartmentRecord"
        "403":
          description: 当前用户没有查看该社团组织架构的权限
        "404":
          description: 当前用户或社团不存在

    post:
      summary: 新增社团部门
      description: 社团负责人、指导老师或系统管理员维护社团部门；部门属于社团，名称在同一社团内唯一。
      operationId: createClubDepartment
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClubDepartmentRequest"
      responses:
        "201":
          description: 社团部门已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubDepartmentRecord"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有维护该社团组织架构的权限
        "404":
          description: 当前用户或社团不存在
        "409":
          description: 社团状态不允许维护或部门名称冲突

  /api/clubs/{clubId}/departments/{departmentId}:
    patch:
      summary: 更新社团部门
      description: 修改部门名称、编码、说明、联系方式、排序和状态；不删除历史成员任期。
      operationId: updateClubDepartment
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: departmentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
