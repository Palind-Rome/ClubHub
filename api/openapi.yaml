    Project:
      type: object
      description: Project initiation application and review result.
      properties:
        id:
          type: integer
          description: Project id in PROJECTS.PROJECT_ID.
          example: 1001
        clubId:
          type: integer
          description: Club that owns the project application.
          example: 1
        projectName:
          type: string
          description: Project name submitted by the club.
          example: 校园公益服务项目
        description:
          type: string
          description: Optional project description.
          example: 组织社团成员开展校园公益服务。
          nullable: true
        leaderUserId:
          type: integer
          description: Optional project leader user id.
          example: 12
          nullable: true
        startDate:
          type: string
          format: date-time
          description: Planned project start time.
          example: "2026-07-15T09:00:00Z"
        endDate:
          type: string
          format: date-time
          description: Optional planned project end time.
          example: "2026-08-15T18:00:00Z"
          nullable: true
        projectStatus:
          type: string
          enum: [pending, running, finished, delayed, closed]
          description: Current project status.
          example: pending
        reviewerUserId:
          type: integer
          description: User id of the reviewer after approval or rejection.
          example: 3
          nullable: true
        reviewComment:
          type: string
          description: Optional reviewer comment.
          example: 立项材料完整，同意执行。
          nullable: true
        createdAt:
          type: string
          format: date-time
          description: Project application creation time.
          example: "2026-07-08T12:00:00Z"
      required:
        - id
        - clubId
        - projectName
        - startDate
        - projectStatus
        - createdAt

    CreateProjectRequest:
      type: object
      description: Request body for creating a project initiation application.
      properties:
        currentUserId:
          type: integer
          description: 当前提交立项申请的用户 ID；后端据此校验其是否为本社团负责人或指导老师。
          minimum: 1
          example: 12
        clubId:
          type: integer
          description: Club that submits the project application.
          minimum: 1
          example: 1
        projectName:
          type: string
          description: Project name.
          minLength: 1
          maxLength: 100
          example: 校园公益服务项目
        description:
          type: string
          description: Optional project description.
          example: 组织社团成员开展校园公益服务。
          nullable: true
        leaderUserId:
          type: integer
          description: Optional project leader user id.
          minimum: 1
          example: 12
          nullable: true
        startDate:
          type: string
          format: date-time
          description: Planned project start time.
          example: "2026-07-15T09:00:00Z"
        endDate:
          type: string
          format: date-time
          description: Optional planned project end time.
          example: "2026-08-15T18:00:00Z"
          nullable: true
      required:
        - currentUserId
        - clubId
        - projectName
        - startDate

    AssignProjectLeaderRequest:
      type: object
      description: Request body for assigning or changing a project leader.
      properties:
        currentUserId:
          type: integer
          description: 当前分配负责人操作用户 ID；仅本社团负责人或干部可操作。
          minimum: 1
          example: 7
        leaderUserId:
          type: integer
          description: User id of an active club member.
          minimum: 1
          example: 12
      required:
        - currentUserId
        - leaderUserId

    ReviewProjectRequest:
      type: object
      description: Request body for reviewing a project initiation application.
      properties:
        currentUserId:
          type: integer
          description: 当前审核操作用户 ID；仅本社团指导老师可审核。
          minimum: 1
          example: 3
        projectStatus:
          type: string
          enum: [running, closed]
          description: Review result. running means approved; closed means rejected or closed.
          example: running
        reviewComment:
          type: string
          description: Optional review comment.
          example: 立项材料完整，同意执行。
          nullable: true
      required:
        - currentUserId
        - projectStatus

    CancelProjectRequest:
      type: object
      description: Request body for canceling a pending or running project.
      properties:
        currentUserId:
          type: integer
          description: 当前撤销操作用户 ID；系统管理员可撤销待审核/进行中项目，本社团负责人可撤销待审核申请，校级社团管理员可撤销进行中项目。
          minimum: 1
          example: 12
        cancelReason:
          type: string
          description: Optional applicant cancellation reason.
          maxLength: 200
          example: 申请材料需要补充，暂时撤销。
          nullable: true
      required:
        - currentUserId
