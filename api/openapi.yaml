          type: string
          nullable: true
          description: 获奖原因或推荐理由；学期考核时为空。
          example: 组织多次技术分享并承担核心项目管理工作。
        activityScore:
          type: number
          format: decimal
          description: 活动参与得分，取值范围 0-100。
          example: 92
        taskScore:
          type: number
          format: decimal
          description: 项目任务得分，取值范围 0-100。
          example: 88
        learningScore:
          type: number
          format: decimal
          description: 学习记录得分，取值范围 0-100。
          example: 95
        awardScore:
          type: number
          format: decimal
          description: 奖项或附加贡献得分，取值范围 0-100。
          example: 80
        totalScore:
          type: number
          format: decimal
          description: 后端汇总计算的总分，满分 400。
          example: 355
        grade:
          type: string
          description: 后端根据总分计算的等级。
          example: 优秀
        publicStatus:
          type: string
          enum: [draft, published]
          description: 公示状态；draft 为草稿，published 为已公示。
          example: published
        publicStatusText:
          type: string
          description: 公示状态中文文案。
          example: 已公示
        commentText:
          type: string
          nullable: true
          description: 考核说明、获奖补充说明或负责人备注。
          example: 综合表现稳定，参与度高。
        createdAt:
          type: string
          format: date-time
          nullable: true
          description: 记录创建时间。
          example: "2026-07-10T08:30:00Z"
      required:
