openapi: 3.0.3
info:
  title: ClubHub API
  description: |
    ClubHub 高校社团运营与协同管理平台 API。

    **API-first 开发流程**：修改本文件 → push → CI 自动生成前后端代码 →
    git pull 拉取生成代码 → 在 Controller / Services / Vue 组件中手写业务逻辑。
  version: 0.1.0

servers:
  - url: http://localhost:5000
    description: 本地开发服务器

paths:
  /api/health:
    get:
      summary: 健康检查
      description: 返回 API 服务运行状态。
      operationId: healthCheck
      responses:
        "200":
          description: 服务正常运行
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          description: 服务状态
          example: healthy
        timestamp:
          type: string
          format: date-time
          description: 当前时间
      required:
        - status
        - timestamp
