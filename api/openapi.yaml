    Recruitment:
      type: object
      properties:
        id:
          type: integer
          description: 招募记录 ID。
          example: 1
        clubId:
          type: integer
          description: 发布该纳新的社团 ID。
          example: 1
        clubName:
          type: string
          description: 发布该纳新的社团名称。
          example: 计算机协会
        title:
          type: string
          description: 纳新标题。
          example: 2026 春季纳新
        description:
          type: string
          description: 纳新的补充说明，可为空。
          nullable: true
          example: 面向对编程、竞赛和项目协作感兴趣的同学。
        startAt:
          type: string
          format: date-time
          description: 纳新开始时间；审核通过后用于计算“未开始/申请中/已结束”。
          nullable: true
          example: "2026-03-01T09:00:00Z"
        endAt:
          type: string
          format: date-time
          description: 纳新结束时间；到期后自动展示为已结束。
          nullable: true
          example: "2026-03-20T18:00:00Z"
        quota:
          type: integer
          description: 计划录取人数上限。
          nullable: true
          example: 30
        requirements:
          type: string
          description: 报名要求或筛选标准。
          nullable: true
          example: 对社团活动有稳定参与时间，愿意参与一次面试。
        recruitStatus:
          type: string
          description: 当前展示状态；draft 和 pending_review 为流程状态，not_started/accepting/ended 由已通过纳新的时间窗口计算得到。
          enum: [draft, pending_review, not_started, accepting, ended]
          example: accepting
        recruitStatusText:
          type: string
          description: 当前展示状态的中文文案。
          example: 申请中
        createdAt:
          type: string
          format: date-time
          description: 招募创建时间。
          example: "2026-02-20T08:30:00Z"
        applicationCount:
          type: integer
          description: 当前报名申请总数。
          example: 18
        acceptedCount:
          type: integer
          description: 当前已录取申请数。
          example: 8
        currentUserApplicationId:
          type: integer
          description: 当前查看用户在该纳新下的申请 ID；未申请时为空。
          nullable: true
          example: 12
        currentUserApplicationStatus:
          type: string
          description: 当前查看用户的申请状态；未申请时为空。
          nullable: true
          example: pending
        currentUserApplicationStatusText:
          type: string
          description: 当前查看用户申请状态的中文文案；未申请时为空。
          nullable: true
          example: 待筛选
        currentUserIsMember:
          type: boolean
          description: 当前查看用户是否已经是该社团成员；干部和负责人也按成员处理。
          example: false
        isOwnProposal:
          type: boolean
          description: 当前查看用户是否应将该纳新归入本社团提出的纳新；同社团干部、负责人共享该视角。
          example: true
        canManage:
          type: boolean
          description: 当前查看用户是否可以管理该纳新和其报名。
          example: true
        canEdit:
          type: boolean
          description: 当前查看用户是否可以编辑该纳新草稿。
          example: false
        canDelete:
          type: boolean
          description: 当前查看用户是否可以删除该纳新草稿。
          example: false
        canReview:
          type: boolean
          description: 当前查看用户是否可以审核该纳新。
          example: false
      required:
        - id
        - clubId
        - clubName
        - title
        - recruitStatus
        - recruitStatusText
        - createdAt
        - applicationCount
        - acceptedCount
        - currentUserIsMember
        - isOwnProposal
        - canManage
        - canEdit
        - canDelete
        - canReview

