          type: integer
          minimum: 0
          maximum: 100
          description: 完成进度百分比。
          example: 100
        taskStatus:
          type: string
          enum: [pending, in_progress, completed, delayed]
          description: 更新后的任务状态。
          example: completed
        delayReason:
          type: string
          maxLength: 255
          description: 延期原因；仅 delayed 状态必填，completed 时会被清空。
          nullable: true
        reportContent:
          type: string
          maxLength: 1000
          description: 本次进度汇报内容；进行中任务必须填写。
          nullable: true
      required:
        - progress
        - taskStatus

    SubmitProjectTaskDeliverableRequest:
      type: object
      description: 提交项目任务成果的请求；提交人由服务端从 Bearer 令牌解析。
      properties:
        deliverableTitle:
          type: string
          minLength: 1
          maxLength: 100
          description: 成果标题。
          example: 阶段成果报告
        deliverableDesc:
          type: string
          nullable: true
          maxLength: 4000
          description: 成果说明。
          example: 已完成活动策划、物资清单和阶段复盘材料。
        deliverableUrl:
          type: string
          nullable: true
          format: uri
          pattern: "^https?://.+"
          maxLength: 255
          description: 成果链接，仅允许 HTTP 或 HTTPS 地址。
          example: https://example.com/report.pdf
      required:
        - deliverableTitle

    ReviewProjectTaskDeliverableRequest:
      type: object
      description: 审核项目任务成果的请求；审核人由服务端从 Bearer 令牌解析。
      properties:
        approved:
          type: boolean
          description: 是否审核通过。
          example: true
        reviewComment:
          type: string
          nullable: true
          maxLength: 255
          description: 审核意见。
          example: 成果完整，同意通过。
      required:
        - approved

    ProjectTaskAssignee:
      type: object
      description: 项目任务的执行人展示信息。
      properties:
        userId:
          type: integer
          description: 执行人用户 ID。
          example: 12
        displayName:
          type: string
          description: 执行人姓名或账号展示名。
          example: 王同学
      required:
        - userId
        - displayName

    ProjectTaskProgressReport:
      type: object
      description: 一次任务进度提交的可追溯记录。
      properties:
        id:
          type: integer
          description: 进度记录 ID。
          example: 8001
        taskId:
          type: integer
          description: 所属任务 ID。
          example: 5001
        reporterUserId:
          type: integer
          description: 提交人用户 ID。
          example: 12
        reporterName:
          type: string
          description: 提交人姓名或账号展示名。
          example: 王同学
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: 本次提交后的任务进度。
          example: 60
        taskStatus:
          type: string
          enum: [pending, in_progress, completed, delayed]
          description: 本次提交后的任务状态。
          example: in_progress
        reportContent:
          type: string
          description: 本次进度汇报内容。
          nullable: true
          example: 已完成物资清单初稿，正在核对预算。
        delayReason:
          type: string
          description: 本次提交的延期原因；仅延期时有值。
          nullable: true
        submittedAt:
          type: string
          format: date-time
          description: 服务端记录的提交时间；任务完成时也以此时间写入完成时间。
      required:
        - id
        - taskId
        - reporterUserId
        - reporterName
        - progress
        - taskStatus
        - submittedAt

    LearningTeacherCandidate:
      type: object
      description: 课程表单使用的授课人候选项；授课人可以是教师或学生。
      required:
        - id
        - displayName
      properties:
        id:
          type: integer
          description: 选择授课人后提交的内部用户 ID。
          example: 30
        realName:
          type: string
          nullable: true
          description: 授课人姓名。
          example: 张老师
        studentNo:
          type: string
          nullable: true
          description: 授课人的学号或工号。
          example: "10001"
        displayName:
          type: string
          description: 包含教师或学生身份、姓名及学工号的展示文本。
          example: 学生 · 张同学（2350001）

    LearningItem:
      type: object
      description: 社团发布的培训课程、视频、文档或资料资源。
      properties:
        id:
          type: integer
          description: LEARNING_ITEMS.ITEM_ID。
          example: 2001
        clubId:
          type: integer
          description: 发布资源的社团。
          example: 1
        uploaderUserId:
          type: integer
          nullable: true
          description: 创建或上传资源的用户。
          example: 12
        instructorUserId:
          type: integer
          nullable: true
          description: 课程授课人，可以是教师或学生；非课程资源可为空。
          example: 30
        title:
          type: string
          description: 课程或资源标题。
          example: Oracle 入门培训视频
        itemType:
          type: string
          description: 资源类型，支持 course、lecture、training、video、document、material。
          example: video
        categoryName:
          type: string
          nullable: true
          description: 资源分类。
          example: 数据库培训
        description:
          type: string
          nullable: true
          maxLength: 1000
          description: 课程或资源说明。
        fileUrl:
          type: string
          nullable: true
          description: 外部文件地址或内部存储引用；列表仅向资源管理者返回，普通用户通过下载接口获取可访问地址。
        startAt:
          type: string
          format: date-time
          nullable: true
          description: 课程开始时间；非课程资源可为空。
        endAt:
          type: string
          format: date-time
          nullable: true
          description: 课程结束时间。
        capacity:
          type: integer
          nullable: true
          description: 课程容量；非课程资源可为空。
          example: 40
        visibility:
          type: string
          enum: [public, club, department]
          description: 可见范围；department 表示与上传人同一社团部门的有效成员。
          example: club
        downloadPermission:
          type: string
          enum: [allow, deny, approval]
          description: 下载设置；approval 表示需要审批，当前不可直接下载。
          example: allow
        itemStatus:
          type: string
          enum: [draft, pending_review, published, rejected, closed, finished]
          description: 发布状态；pending_review 表示等待社团管理员审核，rejected 表示审核驳回。
          example: published
        currentEnrollments:
          type: integer
          description: 当前有效学习记录数量。
          example: 8
        currentUserRecordStatus:
          type: string
          enum: [none, enrolled, learning, completed, cancelled]
          description: 当前用户的学习状态。
        canManage:
          type: boolean
          description: 当前用户是否可按社团负责人权限维护资源；课程授课人也具有该课程的维护权限，但不因此获得审核或加入权限。
        canEnroll:
          type: boolean
          description: 当前用户是否可加入课程；非课程资源恒为 false。
        canCancelEnrollment:
          type: boolean
          description: 当前用户是否可退出课程。
        enrollmentUnavailableReason:
          type: string
          nullable: true
          description: 无法加入课程的中文原因。
        canStartLearning:
          type: boolean
          description: 当前用户是否可开始或继续学习非课程资源。
        learningUnavailableReason:
          type: string
          nullable: true
          description: 无法开始学习资源的中文原因。
        canDownload:
          type: boolean
          description: 当前用户是否可通过下载接口获取文件地址。
        downloadUnavailableReason:
          type: string
          nullable: true
          description: 无法直接下载的中文原因。
      required:
        - id
        - clubId
        - title
        - itemType
        - visibility
        - downloadPermission
        - itemStatus
        - currentEnrollments
        - currentUserRecordStatus
        - canManage
        - canEnroll
        - canCancelEnrollment
        - canStartLearning
        - canDownload

    CreateLearningItemRequest:
      type: object
      description: 创建课程或上传学习资源的请求。
      properties:
        clubId:
          type: integer
          minimum: 1
          description: 发布资源的社团。
          example: 1
        title:
          type: string
          minLength: 1
          maxLength: 100
          description: 课程或资源标题。
          example: Oracle 入门培训视频
        description:
          type: string
          nullable: true
          maxLength: 1000
          description: 课程或资源说明。
        instructorUserId:
          type: integer
          nullable: true
          minimum: 1
          description: 可选的课程授课人，可以是教师或学生；非课程资源可为空。
        itemType:
          type: string
          maxLength: 30
          description: 支持 course、lecture、training、video、document、material。
          example: video
        categoryName:
          type: string
          nullable: true
          maxLength: 100
          description: 资源分类。
        fileUrl:
          type: string
          nullable: true
          maxLength: 255
          description: 视频、文档或资料的 HTTP/HTTPS 文件地址；非课程资源必填。
        startAt:
          type: string
          format: date-time
          nullable: true
          description: 课程开始时间；课程类型必填。
        endAt:
          type: string
          format: date-time
          nullable: true
          description: 课程结束时间。
        capacity:
          type: integer
          nullable: true
          minimum: 1
          description: 课程容量；课程类型必填。
        visibility:
          type: string
          enum: [public, club, department]
          description: 公开、社团内或上传人所在部门内可见。
          example: club
        downloadPermission:
          type: string
          enum: [allow, deny, approval]
          description: 是否允许直接下载；课程无文件时建议 deny。
          example: allow
        itemStatus:
          type: string
          enum: [draft, published]
          default: draft
          description: 初始发布状态。
      required:
        - clubId
        - title
        - itemType
        - visibility
        - downloadPermission
        - itemStatus

    UpdateLearningItemRequest:
      type: object
      description: 更新课程或学习资源的请求。
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 100
          description: 课程或资源标题。
        description:
          type: string
          nullable: true
          description: 课程或资源说明。
        instructorUserId:
          type: integer
          nullable: true
          minimum: 1
          description: 可选的课程授课人，可以是教师或学生；非课程资源可为空。
        itemType:
          type: string
          maxLength: 30
          description: 支持 course、lecture、training、video、document、material。
        categoryName:
          type: string
          nullable: true
          maxLength: 100
          description: 资源分类。
        fileUrl:
          type: string
          nullable: true
          maxLength: 255
          description: 视频、文档或资料的 HTTP/HTTPS 文件地址。
        startAt:
          type: string
          format: date-time
          nullable: true
          description: 课程开始时间。
        endAt:
          type: string
          format: date-time
