    Notice:
      type: object
      description: 公告通知及当前用户已读状态。
      properties:
        id:
          type: integer
          description: 通知 ID。
          example: 1
        clubId:
          type: integer
          description: 社团 ID；全校通知可为空。
          nullable: true
          example: 1
        clubName:
          type: string
          description: 社团名称。
          nullable: true
          example: 计算机协会
        publisherUserId:
          type: integer
          description: 发布人用户 ID。
          example: 2
        publisherName:
          type: string
          description: 发布人展示名称。
          nullable: true
          example: 李四
        noticeType:
          type: string
          description: 通知类型，例如 announcement、urgent、event。
          example: announcement
        title:
          type: string
          description: 通知标题。
          example: 本周例会通知
        content:
          type: string
          description: 通知正文。
          example: 请各位成员准时参加本周例会。
        targetType:
          type: string
          description: 定向类型。
          enum: [school, club, department, member]
          example: club
        targetId:
          type: integer
          description: 目标 ID；社团通知为 clubId，部门通知为成员任期 memberId，成员通知为 userId，全校通知为空。
          nullable: true
          example: 1
        targetName:
          type: string
          description: 前端展示用目标名称。
          nullable: true
          example: 计算机协会
        publishAt:
          type: string
          format: date-time
          description: 发布时间。
        expireAt:
          type: string
          format: date-time
          description: 过期时间。
          nullable: true
        noticeStatus:
          type: string
          description: 通知状态。
          enum: [draft, published, expired]
          example: published
        isRead:
          type: boolean
          description: 当前查看用户是否已读。
        readAt:
          type: string
          format: date-time
          description: 当前查看用户已读时间。
          nullable: true
        audienceCount:
          type: integer
          description: 当前规则下可接收该通知的用户数。
          nullable: true
          example: 28
        readCount:
          type: integer
          description: 已读人数。
          example: 12
      required:
        - id
        - publisherUserId
        - noticeType
        - title
        - content
        - targetType
        - publishAt
        - noticeStatus
        - isRead
        - readCount

    CreateNoticeRequest:
      type: object
      description: 发布公告通知请求。
      properties:
        currentUserId:
          type: integer
          description: 当前发布人用户 ID。
          minimum: 1
          example: 2
        noticeType:
          type: string
          description: 通知类型，例如 announcement、urgent、event。
          minLength: 1
          maxLength: 50
          example: announcement
        title:
          type: string
          description: 通知标题。
          minLength: 1
          maxLength: 120
          example: 本周例会通知
        content:
          type: string
          description: 通知正文。
          minLength: 1
          maxLength: 4000
          example: 请各位成员准时参加本周例会。
        targetType:
          type: string
          description: 定向类型。
          enum: [school, club, department, member]
          example: club
        clubId:
          type: integer
          description: 成员定向所属社团 ID；仅 member 定向需要作为社团上下文，全校、社团、部门定向可为空。
          nullable: true
          example: 1
        targetId:
          type: integer
          description: 目标 ID；school 为空，club 传目标社团 ID，department 传成员任期 memberId，member 传目标 userId。
          nullable: true
          example: 1
        expireAt:
          type: string
          format: date-time
          description: 过期时间，必须晚于发布时间。
          nullable: true
        noticeStatus:
          type: string
          description: 通知状态；默认 published。
          enum: [draft, published]
          default: published
          example: published
      required:
        - currentUserId
        - noticeType
        - title
        - content
        - targetType

