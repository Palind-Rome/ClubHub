        - itemStatus

    ReviewLearningItemRequest:
      type: object
      description: 社团管理员或系统管理员审核课程、资源的请求。
      properties:
        result:
          type: string
          enum: [approved, rejected]
          description: approved 表示审核通过并发布，rejected 表示驳回。
      required:
        - result

    LearningRecord:
      type: object
      description: 课程报名、资源学习进度和下载行为记录。
      properties:
        id:
          type: integer
          description: Learning record id in LEARNING_RECORDS.RECORD_ID.
          example: 3001
        itemId:
          type: integer
          description: Related learning item id.
          example: 2001
        userId:
          type: integer
          description: Learning user id.
          example: 21
        userDisplayName:
          type: string
          description: Learning user's display name.
        userNumber:
          type: string
          nullable: true
          description: Learning user's student or staff number.
        enrollStatus:
          type: string
          enum: [enrolled, learning, completed, cancelled]
          description: Enrollment and learning status.
          example: learning
        enrolledAt:
          type: string
          format: date-time
          nullable: true
          description: Enrollment time.
        progress:
          type: number
          format: double
          nullable: true
          minimum: 0
          maximum: 100
          description: Learning progress percentage.
          example: 60
        durationSeconds:
          type: integer
          nullable: true
          minimum: 0
          description: Accumulated learning duration in seconds.
          example: 1800
        lastLearnAt:
          type: string
          format: date-time
          nullable: true
          description: Last learning time.
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: 完成时间。
        downloadedAt:
          type: string
          format: date-time
          nullable: true
          description: 最近一次下载时间。
        downloadIp:
          type: string
          nullable: true
          description: 最近一次下载 IP。
      required:
        - id
        - itemId
        - userId
        - userDisplayName
        - enrollStatus

    UpdateLearningProgressRequest:
      type: object
      description: 更新当前登录用户学习进度的请求。
      properties:
        progress:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Latest learning progress percentage.
          example: 100
        durationSeconds:
          type: integer
          minimum: 0
          nullable: true
          description: Latest accumulated learning duration in seconds.
          example: 3600
      required:
        - progress

    LearningDownloadResult:
      type: object
      description: 下载权限校验通过后返回的可访问资源地址与记录时间；OSS 资源返回受鉴权的后端流式下载地址。
      properties:
        itemId:
          type: integer
          description: 学习资源 ID。
        title:
          type: string
          description: 资源标题。
        fileUrl:
          type: string
          description: 受鉴权的后端文件地址或历史文件地址。
        downloadedAt:
          type: string
          format: date-time
          description: 本次下载记录时间。
      required:
        - itemId
        - title
        - fileUrl
        - downloadedAt

    LearningItemStatistics:
      type: object
      description: 基于 LEARNING_RECORDS 聚合的资源学习与下载统计。
      properties:
        itemId:
          type: integer
          description: 学习资源 ID。
        title:
          type: string
          description: 资源标题。
        learnerCount:
          type: integer
          description: 非取消状态的学习人数。
        completedCount:
          type: integer
          description: 已完成学习人数。
        downloadCount:
          type: integer
          description: 发生过下载行为的人数。
        averageProgress:
          type: number
          format: double
          description: 学习记录平均进度。
        averageDurationSeconds:
          type: number
          format: double
          description: 平均累计学习时长（秒）。
        totalDurationSeconds:
          type: integer
          description: 累计学习时长（秒）。
      required:
        - itemId
        - title
        - learnerCount
        - completedCount
        - downloadCount
        - averageProgress
        - averageDurationSeconds
        - totalDurationSeconds

    ActivityRegistrationResult:
      type: object
