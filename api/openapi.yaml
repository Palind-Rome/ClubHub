          minimum: 1
          example: 3
        projectStatus:
          type: string
          enum: [running, closed]
          description: Review result. running means approved; closed means rejected or closed.
          example: running
        reviewComment:
          type: string
          description: Optional review comment.
          example: 立项材料完整，同意执行。
          nullable: true
      required:
        - currentUserId
        - projectStatus

    CancelProjectRequest:
      type: object
      description: Request body for canceling a pending or running project.
      properties:
        currentUserId:
          type: integer
          minimum: 1
          example: 12
        cancelReason:
          type: string
          description: Optional applicant cancellation reason.
          maxLength: 200
          example: 申请材料需要补充，暂时撤销。
          nullable: true
      required:
        - currentUserId

    ProjectMember:
      type: object
      description: 项目与用户之间的成员关系及展示信息。
      properties:
        projectMemberId:
          type: integer
          description: 项目成员关系 ID。
          example: 3001
        projectId:
          type: integer
          description: 所属项目 ID。
          example: 1001
        userId:
          type: integer
          description: 项目成员用户 ID。
          example: 12
        realName:
          type: string
          description: 成员真实姓名。
          nullable: true
          example: 王同学
        studentNo:
          type: string
          description: 成员学号或工号。
          nullable: true
          example: "2450001"
        memberRole:
          type: string
          description: 项目内角色。
          enum: [leader, member, mentor]
          example: member
        memberStatus:
          type: string
          description: 项目成员状态。
          enum: [active, removed, quit]
          example: active
        joinedAt:
          type: string
          format: date-time
          description: 本次加入或恢复为 active 的时间。
        leftAt:
          type: string
          format: date-time
          description: 退出或移除时间；active 成员为空。
          nullable: true
        remark:
          type: string
          description: 项目成员备注。
          maxLength: 255
          nullable: true
        createdAt:
          type: string
          format: date-time
          description: 成员关系首次创建时间。
        updatedAt:
          type: string
          format: date-time
          description: 成员关系最近更新时间。
      required:
        - projectMemberId
        - projectId
        - userId
        - memberRole
        - memberStatus
        - joinedAt
        - createdAt
        - updatedAt

    ProjectMemberCandidate:
      type: object
      description: 可加入项目的所属社团 active 成员。
      properties:
        userId:
          type: integer
          description: 候选用户 ID。
          example: 12
        realName:
          type: string
          description: 候选用户真实姓名。
          nullable: true
          example: 王同学
        studentNo:
          type: string
          description: 候选用户学号或工号。
          nullable: true
          example: "2450001"
        displayName:
          type: string
          description: 前端下拉框展示文本。
          example: 王同学（2450001）
      required:
        - userId
        - displayName

    AddProjectMemberRequest:
      type: object
      description: 添加或恢复项目成员的请求；负责人角色只能通过项目负责人分配流程维护。
      properties:
        userId:
          type: integer
          minimum: 1
          description: 所属社团 active 成员的用户 ID。
          example: 12
        memberRole:
          type: string
          description: 新成员的项目内角色。
          enum: [member, mentor]
          default: member
          example: member
        remark:
          type: string
          maxLength: 255
          description: 可选备注。
          nullable: true
      required:
        - userId
        - memberRole

    LearningTeacherCandidate:
      type: object
      description: User-facing instructor option used by the learning course form.
      required:
        - id
        - displayName
      properties:
        id:
          type: integer
          description: Internal user id submitted by the client after the user selects an instructor.
          example: 30
        realName:
          type: string
          nullable: true
          description: Instructor real name.
          example: ???
        studentNo:
          type: string
          nullable: true
          description: Instructor staff number.
          example: "10001"
        displayName:
          type: string
          description: User-facing label containing the instructor name and staff number.
          example: ????10001?

    LearningItem:
      type: object
      description: 社团发布的培训课程、视频、文档或资料资源。
      properties:
        id:
          type: integer
          description: LEARNING_ITEMS.ITEM_ID。
          example: 2001
        clubId:
          type: integer
          description: 发布资源的社团。
          example: 1
        uploaderUserId:
          type: integer
          nullable: true
          description: 创建或上传资源的用户。
          example: 12
        teacherUserId:
          type: integer
          nullable: true
          description: 课程授课人；非课程资源可为空。
          example: 30
        title:
          type: string
          description: 课程或资源标题。
          example: Oracle 入门培训视频
        itemType:
          type: string
          description: 资源类型，支持 course、lecture、training、video、document、material。
          example: video
        categoryName:
          type: string
          nullable: true
          description: 资源分类。
          example: 数据库培训
        description:
          type: string
          nullable: true
          description: 课程或资源说明。
        fileUrl:
          type: string
          nullable: true
          description: 文件地址；列表仅向资源管理者返回，普通用户通过下载接口获取。
        startAt:
          type: string
          format: date-time
          nullable: true
          description: 课程开始时间；非课程资源可为空。
        endAt:
          type: string
          format: date-time
          nullable: true
          description: 课程结束时间。
        capacity:
          type: integer
          nullable: true
          description: 课程容量；非课程资源可为空。
          example: 40
        visibility:
          type: string
          enum: [public, club, department]
          description: 可见范围；department 表示与上传人同一社团部门的有效成员。
          example: club
        downloadPermission:
          type: string
          enum: [allow, deny, approval]
          description: 下载设置；approval 表示需要审批，当前不可直接下载。
          example: allow
        itemStatus:
          type: string
          enum: [draft, published, closed, finished]
          description: 发布状态。
          example: published
        currentEnrollments:
          type: integer
          description: 当前有效学习记录数量。
          example: 8
        currentUserRecordStatus:
          type: string
          enum: [none, enrolled, learning, completed, cancelled]
          description: 当前用户的学习状态。
        canManage:
          type: boolean
          description: 当前用户是否可维护资源并查看统计。
        canEnroll:
          type: boolean
          description: 当前用户是否可加入课程；非课程资源恒为 false。
        canCancelEnrollment:
          type: boolean
          description: 当前用户是否可退出课程。
        enrollmentUnavailableReason:
          type: string
          nullable: true
          description: 无法加入课程的中文原因。
        canStartLearning:
          type: boolean
          description: 当前用户是否可开始或继续学习非课程资源。
        learningUnavailableReason:
          type: string
          nullable: true
          description: 无法开始学习资源的中文原因。
        canDownload:
          type: boolean
          description: 当前用户是否可通过下载接口获取文件地址。
        downloadUnavailableReason:
          type: string
          nullable: true
          description: 无法直接下载的中文原因。
      required:
        - id
        - clubId
        - title
        - itemType
        - visibility
        - downloadPermission
        - itemStatus
        - currentEnrollments
        - currentUserRecordStatus
        - canManage
        - canEnroll
        - canCancelEnrollment
        - canStartLearning
        - canDownload

    CreateLearningItemRequest:
      type: object
      description: 创建课程或上传学习资源的请求。
      properties:
        clubId:
          type: integer
          minimum: 1
          description: 发布资源的社团。
          example: 1
        title:
          type: string
          minLength: 1
          maxLength: 100
          description: 课程或资源标题。
          example: Oracle 入门培训视频
        description:
          type: string
          nullable: true
          description: 课程或资源说明。
        teacherUserId:
          type: integer
          nullable: true
          minimum: 1
          description: 课程授课人；课程类型必填。
        itemType:
          type: string
          maxLength: 30
          description: 支持 course、lecture、training、video、document、material。
          example: video
        categoryName:
          type: string
          nullable: true
          maxLength: 100
          description: 资源分类。
        fileUrl:
          type: string
          nullable: true
          maxLength: 255
          description: 视频、文档或资料的 HTTP/HTTPS 文件地址；非课程资源必填。
        startAt:
          type: string
          format: date-time
          nullable: true
          description: 课程开始时间；课程类型必填。
        endAt:
          type: string
          format: date-time
          nullable: true
          description: 课程结束时间。
        capacity:
          type: integer
          nullable: true
          minimum: 1
          description: 课程容量；课程类型必填。
        visibility:
          type: string
          enum: [public, club, department]
          description: 公开、社团内或上传人所在部门内可见。
          example: club
        downloadPermission:
          type: string
          enum: [allow, deny, approval]
          description: 是否允许直接下载；课程无文件时建议 deny。
          example: allow
        itemStatus:
          type: string
          enum: [draft, published]
          default: draft
          description: 初始发布状态。
      required:
        - clubId
        - title
        - itemType
        - visibility
        - downloadPermission
        - itemStatus

    UpdateLearningItemRequest:
      type: object
      description: 更新课程或学习资源的请求。
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 100
          description: 课程或资源标题。
        description:
          type: string
          nullable: true
          description: 课程或资源说明。
        teacherUserId:
          type: integer
          nullable: true
          minimum: 1
          description: 课程授课人；课程类型必填。
        itemType:
          type: string
          maxLength: 30
          description: 支持 course、lecture、training、video、document、material。
        categoryName:
          type: string
          nullable: true
          maxLength: 100
          description: 资源分类。
        fileUrl:
          type: string
          nullable: true
          maxLength: 255
          description: 视频、文档或资料的 HTTP/HTTPS 文件地址。
        startAt:
          type: string
          format: date-time
          nullable: true
          description: 课程开始时间。
        endAt:
          type: string
          format: date-time
          nullable: true
          description: 课程结束时间。
        capacity:
          type: integer
          nullable: true
          minimum: 1
          description: 课程容量。
        visibility:
          type: string
          enum: [public, club, department]
          description: 公开、社团内或上传人所在部门内可见。
        downloadPermission:
          type: string
          enum: [allow, deny, approval]
          description: 下载设置。
        itemStatus:
          type: string
          enum: [draft, published, closed]
          description: 更新后的发布状态。
      required:
        - title
        - itemType
        - visibility
        - downloadPermission
        - itemStatus

    LearningRecord:
      type: object
      description: 课程报名、资源学习进度和下载行为记录。
      properties:
        id:
          type: integer
          description: Learning record id in LEARNING_RECORDS.RECORD_ID.
          example: 3001
        itemId:
          type: integer
          description: Related learning item id.
          example: 2001
        userId:
          type: integer
          description: Learning user id.
          example: 21
        userDisplayName:
          type: string
          description: Learning user's display name.
        userNumber:
          type: string
          nullable: true
          description: Learning user's student or staff number.
        enrollStatus:
          type: string
          enum: [enrolled, learning, completed, cancelled]
          description: Enrollment and learning status.
          example: learning
        enrolledAt:
          type: string
          format: date-time
          nullable: true
          description: Enrollment time.
        progress:
          type: number
          format: double
          nullable: true
          minimum: 0
          maximum: 100
          description: Learning progress percentage.
          example: 60
        durationSeconds:
          type: integer
          nullable: true
          minimum: 0
          description: Accumulated learning duration in seconds.
          example: 1800
        lastLearnAt:
          type: string
          format: date-time
          nullable: true
          description: Last learning time.
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: 完成时间。
        downloadedAt:
          type: string
          format: date-time
          nullable: true
          description: 最近一次下载时间。
        downloadIp:
          type: string
          nullable: true
          description: 最近一次下载 IP。
      required:
        - id
        - itemId
        - userId
        - userDisplayName
        - enrollStatus

    UpdateLearningProgressRequest:
      type: object
      description: 更新当前登录用户学习进度的请求。
      properties:
        progress:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Latest learning progress percentage.
          example: 100
        durationSeconds:
          type: integer
          minimum: 0
          nullable: true
          description: Latest accumulated learning duration in seconds.
          example: 3600
      required:
        - progress

    LearningDownloadResult:
      type: object
      description: 下载权限校验通过后返回的资源地址与记录时间。
      properties:
        itemId:
          type: integer
        title:
          type: string
        fileUrl:
          type: string
        downloadedAt:
          type: string
          format: date-time
      required:
        - itemId
        - title
        - fileUrl
        - downloadedAt

    LearningItemStatistics:
      type: object
      description: 基于 LEARNING_RECORDS 聚合的资源学习与下载统计。
      properties:
        itemId:
          type: integer
        title:
          type: string
        learnerCount:
          type: integer
          description: 非取消状态的学习人数。
        completedCount:
          type: integer
          description: 已完成学习人数。
        downloadCount:
          type: integer
          description: 发生过下载行为的人数。
        averageProgress:
          type: number
          format: double
          description: 学习记录平均进度。
        averageDurationSeconds:
          type: number
          format: double
          description: 平均累计学习时长（秒）。
        totalDurationSeconds:
          type: integer
          description: 累计学习时长（秒）。
      required:
        - itemId
        - title
        - learnerCount
        - completedCount
        - downloadCount
        - averageProgress
        - averageDurationSeconds
        - totalDurationSeconds

    ActivityRegistrationResult:
      type: object
      properties:
        participationId:
          type: integer
          description: 活动参与记录 ID
        activityId:
          type: integer
        userId:
          type: integer
        registerStatus:
          type: string
          enum: [pending, accepted, cancelled, rejected]
        registeredAt:
          type: string
          format: date-time
        currentParticipants:
          type: integer
          description: 报名成功后的当前有效报名人数
        message:
          type: string
          example: 报名成功
      required:
        - participationId
        - activityId
        - userId
        - registerStatus
        - registeredAt
        - currentParticipants
        - message
