openapi: 3.0.3
info:
  title: ClubHub API
  description: |
    ClubHub 高校社团运营与协同管理平台 API。

    **API-first 开发流程**：修改本文件 → push → CI 自动生成前后端代码 →
    git pull 拉取生成代码 → 在 Controller / Services / Vue 组件中手写业务逻辑。
  version: 0.1.0

servers:
  - url: http://localhost:5000
    description: 本地开发服务器

paths:
  /api/health:
    get:
      summary: 健康检查
      operationId: healthCheck
      responses:
        "200":
          description: 服务正常运行
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /api/auth/register:
    post:
      summary: 用户注册
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: 注册信息不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: 用户名或学工号已存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/login:
    post:
      summary: 用户登录
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功，返回用户和角色信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: 登录信息不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: 用户名/学工号或密码错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 账号已被禁用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/session:
    get:
      summary: 刷新当前用户会话
      description: 依据 Bearer 登录令牌中的当前用户重新计算角色、社团身份和权限，用于成员身份变化后的前端会话同步。
      operationId: refreshAuthSession
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 已重新计算的用户会话
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: 登录状态缺失或令牌无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 账号已被禁用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/roles:
    get:
      summary: 获取基础角色定义
      operationId: getRoleDefinitions
      responses:
        "200":
          description: 基础角色列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoleDefinition"

  /api/auth/permissions:
    get:
      summary: 获取权限目录
      operationId: getPermissionCatalog
      responses:
        "200":
          description: 权限目录
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PermissionDefinition"

  /api/auth/permissions/check:
    get:
      summary: 检查用户是否拥有指定权限
      operationId: checkPermission
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
        - name: permission
          in: query
          required: true
          schema:
            type: string
        - name: clubId
          in: query
          required: false
          description: Optional club id filter.
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: 权限判断结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionCheckResult"
        "400":
          description: 请求参数不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/roles/assign:
    post:
      summary: 分配用户角色
      operationId: assignUserRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignRoleRequest"
      responses:
        "200":
          description: 角色分配成功或已存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleAssignmentResult"
        "400":
          description: 请求参数不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 操作人没有角色分配权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 用户或角色不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/notices:
    get:
      summary: 查询公告通知
      description: 按当前用户权限返回面向全校、社团、部门或成员的有效通知，并附带已读状态。
      operationId: getNotices
      parameters:
        - name: viewerUserId
          in: query
          required: true
          description: 当前登录用户 ID（临时兼容，待 NoticesController 迁移至 JWT 后移除）。
          schema:
            type: integer
            minimum: 1
        - name: noticeStatus
          in: query
          required: false
          description: 公告状态筛选；默认返回 published。
          schema:
            type: string
            enum: [draft, published, expired]
            default: published
        - name: targetType
          in: query
          required: false
          description: 定向类型筛选。
          schema:
            type: string
            enum: [school, club, department, member]
        - name: clubId
          in: query
          required: false
          description: 社团上下文筛选。
          schema:
            type: integer
        - name: unreadOnly
          in: query
          required: false
          description: 是否仅返回未读通知。
          schema:
            type: boolean
      responses:
        "200":
          description: 当前用户可见的公告通知列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notice"
        "400":
          description: 查询参数不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 当前用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      summary: 发布公告通知
      description: 发布面向全校、指定社团、指定部门或指定成员的通知，并校验发布人权限和目标对象。
      operationId: createNotice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoticeRequest"
      responses:
        "201":
          description: 公告通知已发布
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notice"
        "400":
          description: 请求内容不符合业务规则
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 当前用户没有发布权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 发布人、社团或目标对象不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/notices/{noticeId}/reads:
    post:
      summary: 标记通知已读
      description: 当前用户阅读可见通知后写入已读记录；重复标记会返回已有记录。
      operationId: markNoticeRead
      parameters:
        - name: noticeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkNoticeReadRequest"
      responses:
        "200":
          description: 已读记录已存在或已写入
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoticeReadResult"
        "400":
          description: 当前用户缺失
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: 当前用户不可阅读该通知
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: 当前用户或通知不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/clubs:
    get:
      summary: 获取社团列表
      operationId: getClubs
      responses:
        "200":
          description: 社团列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Club"
    post:
      summary: 创建社团
      operationId: createClub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClubRequest"
      responses:
        "201":
          description: 社团已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
        "400":
          description: 当前用户缺失、账号不可用或请求内容不合法
        "403":
          description: 仅平台管理员可以直接创建社团
        "404":
          description: 当前操作用户不存在
        "409":
          description: 社团名称已存在或已有有效注册申请

  /api/clubs/applications:
    get:
      summary: 按当前用户权限查询社团注册申请
      operationId: getClubApplications
      parameters:
        - name: auditStatus
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: 社团注册申请列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClubApplication"
        "400":
          description: 当前用户缺失或审核状态不合法
        "404":
          description: 当前用户不存在
    post:
      summary: 提交社团注册申请
      description: 仅学生角色可以提交社团注册申请；平台管理员、指导老师等非学生角色不能通过该入口发起申请。
      operationId: createClubApplication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClubApplicationRequest"
      responses:
        "201":
          description: 社团注册申请已提交
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubApplication"
        "400":
          description: 请求内容不符合业务规则
        "404":
          description: 当前用户不存在
        "403":
          description: 当前用户不是学生申请人或无权提交申请
        "409":
          description: 社团名称已存在或已有待审核申请

  /api/clubs/applications/{clubId}/review:
    patch:
      summary: 平台管理员审核社团注册申请
      operationId: reviewClubApplication
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewClubApplicationRequest"
      responses:
        "200":
          description: 审核结果已保存
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubApplication"
        "400":
          description: 审核内容不符合业务规则
        "404":
          description: 当前用户或申请不存在
        "409":
          description: 当前申请状态不允许审核
        "403":
          description: 当前用户没有审核权限

  /api/clubs/{clubId}:
    get:
      summary: 获取社团详情
      operationId: getClubById
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 社团详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
    put:
      summary: 更新社团
      operationId: updateClub
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClubRequest"
      responses:
        "200":
          description: 社团已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
  /api/clubs/{clubId}/dissolve:
    patch:
      summary: 解散社团
      description: 社团管理员或系统管理员可以解散社团；系统保留社团档案和成员任期历史，将社团状态标记为 inactive。
      operationId: dissolveClub
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DissolveClubRequest"
      responses:
        "204":
          description: 社团已解散
        "400":
          description: 当前用户或社团状态不符合业务规则
        "403":
          description: 当前用户没有解散社团权限
        "404":
          description: 当前用户或社团不存在
        "409":
          description: 社团已解散或当前状态不允许解散

  /api/clubs/{clubId}/profile:
    patch:
      summary: 维护社团基础信息
      description: 系统管理员、本社团负责人或指导老师可以维护社团简介、联系方式、指导老师和负责人信息；社团管理员只处理社团注册审核和社团状态管理，不参与社团内部档案维护。
      operationId: updateClubProfile
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClubProfileRequest"
      responses:
        "200":
          description: 社团基础信息已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有维护该社团的权限
        "404":
          description: 当前用户、社团或负责人不存在
        "409":
          description: 社团状态不允许维护或社团名称冲突

  /api/clubs/{clubId}/members:
    get:
      summary: 查询社团成员与干部任期记录
      description: 系统管理员、社团管理员、本社团负责人、干部、成员和指导老师可以只读查看成员及任期；默认仅返回当前有效记录，可选择包含历史记录，并可按届、部门或小组筛选。社团管理员不参与内部任期维护。
      operationId: getClubMembers
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: includeHistory
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: departmentName
          in: query
          required: false
          schema:
            type: string
            example: "宣传部"
          description: 按 CLUB_MEMBERS.department_name 精确筛选。
        - name: groupName
          in: query
          required: false
          schema:
            type: string
            example: "摄影组"
          description: 按 CLUB_MEMBERS.group_name 精确筛选。
        - name: termName
          in: query
          required: false
          schema:
            type: string
            example: "2026-2027学年"
          description: 按 CLUB_MEMBERS.term_name 精确筛选，例如 2026-2027学年。
      responses:
        "200":
          description: 社团成员与任期记录列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClubMemberRecord"
        "403":
          description: 当前用户没有查看该社团成员的权限
        "404":
          description: 当前用户或社团不存在

  /api/clubs/{clubId}/members/terms:
    post:
      summary: 新增社团成员或干部任期
      description: 系统管理员、本社团负责人或指导老师可以为成员新增职位任期；新增任期时可关闭该成员原有效任期以保留历史记录。
      operationId: createClubMemberTerm
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClubMemberTermRequest"
      responses:
        "201":
          description: 社团成员或干部任期已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubMemberRecord"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有维护该社团成员的权限
        "404":
          description: 当前用户、社团或目标成员不存在
        "409":
          description: 社团状态不允许维护

  /api/clubs/{clubId}/members/{memberId}:
    patch:
      summary: 更新社团成员或干部任期
      description: 系统管理员、本社团负责人或指导老师可以修正成员部门、职位、任期和状态，不删除历史记录。
      operationId: updateClubMemberTerm
      parameters:
        - name: clubId
          in: path
          required: true
          description: 社团 ID。
          schema:
            type: integer
            example: 1
        - name: memberId
          in: path
          required: true
          description: 成员任期记录 ID。
          schema:
            type: integer
            example: 101
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClubMemberTermRequest"
      responses:
        "200":
          description: 社团成员或干部任期已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubMemberRecord"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有维护该社团成员的权限
        "404":
          description: 当前用户、社团或成员任期记录不存在
        "409":
          description: 社团状态不允许维护

  /api/clubs/{clubId}/members/{memberId}/grouping:
    patch:
      summary: 更新社团成员部门和小组归属
      description: 系统管理员、本社团负责人或指导老师可以调整成员部门和小组；干部只能维护自己管辖范围内的当前有效成员，并只能分配到自己管辖范围。
      operationId: updateClubMemberGrouping
      parameters:
        - name: clubId
          in: path
          required: true
          description: 社团 ID。
          schema:
            type: integer
            example: 1
        - name: memberId
          in: path
          required: true
          description: 成员任期记录 ID。
          schema:
            type: integer
            example: 101
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClubMemberGroupingRequest"
      responses:
        "200":
          description: 社团成员部门和小组已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubMemberRecord"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有维护该成员分组的权限
        "404":
          description: 当前用户、社团或成员任期记录不存在
        "409":
          description: 社团状态或成员任期状态不允许维护

  /api/clubs/{clubId}/members/self/exit:
    patch:
      summary: 学生主动退出社团
      description: 当前社团成员主动退出社团，系统保留历史任期记录，并同步移除该社团成员身份角色。
      operationId: exitCurrentClubMember
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExitClubMemberRequest"
      responses:
        "204":
          description: 已退出社团
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有退出该社团的权限或需先移交负责人
        "404":
          description: 当前用户、社团或有效成员身份不存在
        "409":
          description: 社团状态不允许退出或成员身份已结束

  /api/clubs/{clubId}/members/{memberId}/exit:
    patch:
      summary: 移出社团成员
      description: 系统管理员、本社团负责人或干部可以将当前有效成员移出社团，系统保留历史任期记录，并同步移除该社团成员身份角色。
      operationId: removeClubMember
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExitClubMemberRequest"
      responses:
        "204":
          description: 已移出社团成员
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有移出该成员的权限或需先移交负责人
        "404":
          description: 当前用户、社团或成员任期记录不存在
        "409":
          description: 社团状态不允许移出或成员身份已结束

  /api/clubs/{clubId}/evaluations:
    get:
      summary: 查询社团成员评价考核记录
      description: 普通成员只能查看本人已公示评价；干部只能查看本人管辖部门或小组成员评价；负责人和系统管理员可查看本社团全部评价。evaluationType=award 用于评优评奖结果与公示。
      operationId: getClubEvaluations
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: termName
          in: query
          required: false
          schema:
            type: string
          description: 按 EVALUATIONS.term_name 精确筛选。
        - name: evaluationType
          in: query
          required: false
          schema:
            type: string
            enum: [semester, award]
          description: semester 表示学期考核，award 表示评优评奖结果。
      responses:
        "200":
          description: 按角色可见范围过滤后的评价考核记录
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClubEvaluationRecord"
        "403":
          description: 当前用户没有查看该社团评价考核的权限
        "404":
          description: 当前用户或社团不存在

    post:
      summary: 录入社团成员评价考核或评优评奖结果
      description: 负责人和系统管理员可以录入任意成员评价；干部只能录入自己管辖部门或小组成员评价。评优评奖按 evaluationType=award 记录奖项标题、等级、获奖原因和公示状态。
      operationId: createClubEvaluation
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClubEvaluationRequest"
      responses:
        "201":
          description: 评价考核记录已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubEvaluationRecord"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有录入该成员评价考核的权限
        "404":
          description: 当前用户、社团或目标成员不存在
        "409":
          description: 社团状态不允许维护

  /api/clubs/{clubId}/evaluations/{evaluationId}:
    patch:
      summary: 更新社团成员评价考核或评优评奖结果
      description: 负责人和系统管理员可以更新任意成员评价；干部只能更新自己管辖部门或小组成员评价。总分和等级由后端重新计算，公示状态用于控制评优评奖结果展示。
      operationId: updateClubEvaluation
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: evaluationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClubEvaluationRequest"
      responses:
        "200":
          description: 评价考核记录已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubEvaluationRecord"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有维护该评价考核的权限
        "404":
          description: 当前用户、社团或评价考核记录不存在
        "409":
          description: 社团状态不允许维护

  /api/recruitments:
    get:
      summary: 查询社团招募列表
      description: 学生可查看审核通过后的纳新和自己的报名状态；社团干部、负责人可查看本社团草稿、审核中和已通过纳新；社团管理员可查看审核中的纳新。
      operationId: getRecruitments
      parameters:
        - name: viewerUserId
          in: query
          required: true
          description: 当前登录用户 ID（临时兼容，待 RecruitmentsController 迁移至 JWT 后移除）。
          schema:
            type: integer
            minimum: 1
        - name: clubId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, pending_review, not_started, accepting, ended]
      responses:
        "200":
          description: 招募列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recruitment"
        "400":
          description: 请求参数不合法
        "404":
          description: 当前用户不存在
    post:
      summary: 创建社团招募
      description: 系统管理员或目标社团的社团干部、负责人可以创建草稿或提交审核；审核通过后才会对学生开放。
      operationId: createRecruitment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecruitmentRequest"
      responses:
        "201":
          description: 招募已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recruitment"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有管理该社团招募的权限
        "404":
          description: 当前用户或社团不存在
        "409":
          description: 社团状态不允许创建招募

  /api/recruitments/{recruitId}:
    patch:
      summary: 更新社团招募
      description: 目标社团的社团干部、负责人可以维护本社团草稿，并将草稿提交社团管理员审核；发布者不能直接改为开放状态。
      operationId: updateRecruitment
      parameters:
        - name: recruitId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecruitmentRequest"
      responses:
        "200":
          description: 招募已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recruitment"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有管理该社团招募的权限
        "404":
          description: 当前用户或招募不存在
        "409":
          description: 招募状态不允许维护
    delete:
      summary: 删除草稿招募
      description: 目标社团的社团干部、负责人可以删除本社团草稿招募。
      operationId: deleteRecruitment
      parameters:
        - name: currentUserId
          in: query
          required: true
          description: 当前登录用户 ID（临时兼容，待 RecruitmentsController 迁移至 JWT 后移除）。
          schema:
            type: integer
            minimum: 1
        - name: recruitId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 草稿已删除
        "400":
          description: 当前用户不合法
        "403":
          description: 当前用户没有删除该草稿的权限
        "404":
          description: 当前用户或招募不存在
        "409":
          description: 只有草稿招募可以删除

  /api/recruitments/{recruitId}/review:
    patch:
      summary: 审核社团招募
      description: 社团管理员审核干部或负责人提交的纳新；审核通过后按开始和结束时间自动显示为未开始、申请中或已结束，驳回后回到草稿。
      operationId: reviewRecruitment
      parameters:
        - name: recruitId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewRecruitmentRequest"
      responses:
        "200":
          description: 审核结果已保存
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recruitment"
        "400":
          description: 审核内容不符合业务规则
        "403":
          description: 当前用户没有审核招募的权限
        "404":
          description: 当前用户或招募不存在
        "409":
          description: 招募状态不允许审核或同一社团同时间已有已通过招募

  /api/recruitments/{recruitId}/applications:
    get:
      summary: 查询招募报名列表
      description: 社团干部可查看本招募全部报名；学生只能查看自己的报名。
      operationId: getRecruitmentApplications
      parameters:
        - name: viewerUserId
          in: query
          required: true
          description: 当前登录用户 ID（临时兼容，待 RecruitmentsController 迁移至 JWT 后移除）。
          schema:
            type: integer
            minimum: 1
        - name: recruitId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 招募报名列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecruitmentApplication"
        "403":
          description: 当前用户没有查看该招募报名的权限
        "404":
          description: 当前用户或招募不存在
    post:
      summary: 提交招募报名
      description: 学生在招募开放时间内提交报名理由；同一学生对同一招募只能提交一次。
      operationId: createRecruitmentApplication
      parameters:
        - name: recruitId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecruitmentApplicationRequest"
      responses:
        "201":
          description: 报名已提交
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecruitmentApplication"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有报名权限
        "404":
          description: 当前用户或招募不存在
        "409":
          description: 已报名、已是成员、社团数量达到上限或招募不接受报名

  /api/recruitments/applications/{applicationId}/review:
    patch:
      summary: 筛选招募报名
      description: 社团干部录入面试分并给出录取或拒绝结论；录取后写入社团成员表。
      operationId: reviewRecruitmentApplication
      parameters:
        - name: applicationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewRecruitmentApplicationRequest"
      responses:
        "200":
          description: 筛选结果已保存
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecruitmentApplication"
        "400":
          description: 请求内容不符合业务规则
        "403":
          description: 当前用户没有筛选该报名的权限
        "404":
          description: 当前用户或报名不存在
        "409":
          description: 报名状态、名额、成员关系或社团数量上限不允许录取

  /api/activities:
    get:
      summary: 获取活动列表
      operationId: getActivities
      parameters:
        - name: currentUserId
          in: query
          required: false
          description: 当前登录用户 ID，用于返回该用户是否已报名
          schema:
            type: integer
      responses:
        "200":
          description: 活动列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"
    post:
      summary: 创建活动并提交审核
      description: 需要登录，并具备目标社团的 activity:create 权限。创建人由服务端从 Bearer 令牌解析，不接受客户端传入创建人用户 ID。
      operationId: createActivity
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActivityRequest"
      responses:
        "201":
          description: 活动已创建，等待审核
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "400":
          description: 请求参数或业务规则不合法
        "401":
          description: 当前用户未登录或登录状态已失效
        "403":
          description: 当前用户没有该社团的活动创建权限

  /api/activities/{activityId}:
    get:
      summary: 获取活动详情
      operationId: getActivityById
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
        - name: currentUserId
          in: query
          required: false
          description: 当前登录用户 ID，用于返回该用户是否已报名
          schema:
            type: integer
      responses:
        "200":
          description: 活动详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  /api/activities/{activityId}/registrations:
    post:
      summary: 报名活动
      description: 需要登录。报名人由服务端从 Bearer 令牌解析，不接受客户端指定用户 ID。
      operationId: registerActivity
      security:
        - bearerAuth: []
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: 报名成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityRegistrationResult"
        "400":
          description: 报名请求不合法或不符合报名条件
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: 当前用户未登录或登录状态已失效
        "404":
          description: 活动或用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: 报名状态冲突，例如重复报名或名额已满
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/activities/{activityId}/review:
    post:
      summary: 审核活动并发布或驳回
      description: 需要登录，并具备目标社团的 activity:review 权限。审核人由服务端从 Bearer 令牌解析。
      operationId: reviewActivity
      security:
        - bearerAuth: []
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewActivityRequest"
      responses:
        "200":
          description: 活动审核结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "400":
          description: 当前活动状态不允许审核
        "401":
          description: 当前用户未登录或登录状态已失效
        "403":
          description: 当前用户没有该社团的活动审核权限
        "404":
          description: 活动不存在

  /api/activities/{activityId}/budget:
    put:
      summary: 提交或更新活动经费预算申请
      description: 社团负责人提交活动经费预算金额、用途和明细；使用现有 ACTIVITIES 表经费字段，不新增表结构。待审批或已驳回状态允许重新提交并覆盖旧申请，审批通过后不可再修改。
      operationId: applyActivityBudget
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyActivityBudgetRequest"
      responses:
        "200":
          description: 经费预算已提交，进入待审批状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "400":
          description: 预算金额、用途或活动状态不合法
        "401":
          description: 当前用户未登录或登录状态已失效
        "403":
          description: 当前用户没有该社团的经费申请权限
        "404":
          description: 活动不存在

  /api/activities/{activityId}/budget/review:
    post:
      summary: 审批活动经费预算
      description: 指导老师、社团管理员或系统管理员审批待审批的活动经费预算，并记录审批意见。
      operationId: reviewActivityBudget
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewActivityBudgetRequest"
      responses:
        "200":
          description: 经费审批结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "400":
          description: 当前经费状态不允许审批或参数不合法
        "401":
          description: 当前用户未登录或登录状态已失效
        "403":
          description: 当前用户没有该社团的经费审批权限
        "404":
          description: 活动不存在

  /api/activities/{activityId}/checkin-settings:
    put:
      summary: 设置活动签到签退码和有效时间
      description: 需要登录，并具备目标社团的 activity:checkin:manage 权限。
      operationId: updateActivityCheckinSettings
      security:
        - bearerAuth: []
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCheckinSettingsRequest"
      responses:
        "200":
          description: 签到签退设置已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "400":
          description: 签到或签退时间段不合法
        "401":
          description: 当前用户未登录或登录状态已失效
        "403":
          description: 当前用户没有该社团的签到管理权限
        "404":
          description: 活动不存在

  /api/activities/{activityId}/participations:
    get:
      summary: 获取活动参与记录
      description: 需要登录。具备 activity:checkin:manage 或 activity:review 时返回全部记录；其他登录用户仅返回本人记录。
      operationId: getActivityParticipations
      security:
        - bearerAuth: []
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 活动参与记录列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityParticipation"
        "401":
          description: 当前用户未登录或登录状态已失效
        "404":
          description: 活动不存在

  /api/activities/{activityId}/checkin:
    post:
      summary: 活动签到
      description: 需要登录，并具备 activity:checkin 权限。签到用户由服务端从 Bearer 令牌解析。
      operationId: checkinActivity
      security:
        - bearerAuth: []
      parameters:
